<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP AI 实时语音对话</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200">
    <link rel="stylesheet" href="/static/ai-chat.css">
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #030919; }
        *, *::before, *::after { box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="template-ai-chat">
        <main class="ai-chat-container" id="aiChatContainer" aria-label="GSP AI 实时对话">
            <header class="ai-stage-brand">
                <span class="ai-stage-kicker">GSP 学习活动</span>
                <h1>AI <em>实时对话</em></h1>
                <p>独立语音服务 · GLM-Realtime</p>
            </header>

            <section class="ai-conversation-stage" aria-label="AI 对话控制">
                <div class="ai-avatar-wrapper" id="aiAvatarRing">
                    <video class="ai-avatar-video" id="aiAvatarVideo" playsinline muted loop autoplay>
                        <source src="/static/assets/聆听.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="ai-stage-status" data-state="idle">
                    <span class="ai-status-dot" aria-hidden="true"></span>
                    <strong id="aiChatStatus" aria-live="polite">正在连接实时对话</strong>
                </div>
                <p class="ai-stage-hint" id="aiStageHint">请选择一种对话方式开始</p>

                <div class="ai-mode-actions" aria-label="对话模式">
                    <button class="ai-mode-btn is-selected" id="aiRealtimeBtn" type="button" disabled>
                        <span class="material-symbols-rounded" aria-hidden="true">forum</span>
                        <span class="ai-mode-copy">
                            <strong class="realtime-action-label">实时对话</strong>
                            <small class="realtime-action-hint">自动断句，连续交流</small>
                        </span>
                    </button>
                    <button class="ai-mode-btn" id="aiManualBtn" type="button" disabled>
                        <span class="material-symbols-rounded" aria-hidden="true">mic</span>
                        <span class="ai-mode-copy">
                            <strong class="manual-action-label">点击录音</strong>
                            <small>再次点击后发送</small>
                        </span>
                    </button>
                </div>
            </section>

            <section class="ai-current-turn" aria-label="当前对话记录">
                <button class="ai-clear-btn" id="aiClearBtn" type="button" aria-label="重新开始对话" title="重新开始对话">
                    <span class="material-symbols-rounded" aria-hidden="true">restart_alt</span>
                </button>
                <div class="ai-turn-content" id="aiTurnContent" hidden>
                    <article class="ai-turn-row ai-turn-user">
                        <span class="ai-turn-label">我的输入</span>
                        <p id="aiCurrentUserText">正在识别语音…</p>
                    </article>
                    <article class="ai-turn-row ai-turn-assistant">
                        <span class="ai-turn-label">AI 输出</span>
                        <p id="aiCurrentAssistantText">等待 AI 回答…</p>
                    </article>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/ai-chat.js?v=2"></script>
</body>
</html>
