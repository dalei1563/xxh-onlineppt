<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSP 学习会 - 远程控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #003366 0%, #004d99 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            user-select: none;
        }

        /* 头部 */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
        }

        .status-dot.connected {
            background: #2ecc71;
        }

        /* 当前页码显示 */
        .current-page {
            text-align: center;
            padding: 30px 20px;
        }

        .page-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .page-number {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .page-total {
            font-size: 18px;
            opacity: 0.7;
        }

        /* 控制按钮区域 */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .control-row {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 20px 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn .icon {
            font-size: 28px;
        }

        /* 主要导航按钮 */
        .btn-prev, .btn-next {
            background: rgba(255,255,255,0.95);
            color: #003366;
        }

        .btn-prev:active, .btn-next:active {
            background: rgba(255,255,255,0.8);
        }

        /* 次要按钮 */
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-secondary:active {
            background: rgba(255,255,255,0.3);
        }

        /* 特殊按钮 */
        .btn-first, .btn-last {
            background: rgba(255,255,255,0.3);
        }

        /* 跳转区域 */
        .jump-section {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin: 0 20px 20px;
        }

        .jump-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
            text-align: center;
        }

        .jump-input-row {
            display: flex;
            gap: 10px;
        }

        .jump-input {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 20px;
            text-align: center;
        }

        .jump-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .jump-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            background: #2ecc71;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .jump-btn:active {
            background: #27ae60;
        }

        /* 快捷页码 */
        .quick-pages {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }

        .quick-page-btn {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .quick-page-btn:active {
            background: rgba(255,255,255,0.3);
        }

        /* 二维码区域 */
        .qr-section {
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .qr-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .qr-container {
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 12px;
        }

        #qrcode {
            width: 120px;
            height: 120px;
        }

        .qr-hint {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
        }

        /* 演示页面链接 */
        .demo-link {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            opacity: 0.7;
        }

        .demo-link a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="logo">GSP®</div>
        <div class="subtitle">2026年7月线下学习会 - 远程控制</div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
        <div class="status-item">
            <span>连接数: </span>
            <span id="clientCount">0</span>
        </div>
    </div>

    <!-- 当前页码 -->
    <div class="current-page">
        <div class="page-label">当前页码</div>
        <div class="page-number" id="currentPage">1</div>
        <div class="page-total">/ 67 页</div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <!-- 第一行: 首页 / 上一页 / 下一页 / 末页 -->
        <div class="control-row">
            <button class="control-btn btn-first" onclick="goFirst()">
                <span class="icon">⏮</span>
                <span>首页</span>
            </button>
            <button class="control-btn btn-prev" onclick="goPrev()">
                <span class="icon">◀</span>
                <span>上一页</span>
            </button>
            <button class="control-btn btn-next" onclick="goNext()">
                <span class="icon">▶</span>
                <span>下一页</span>
            </button>
            <button class="control-btn btn-last" onclick="goLast()">
                <span class="icon">⏭</span>
                <span>末页</span>
            </button>
        </div>

        <!-- 第二行: 全屏 -->
        <div class="control-row">
            <button class="control-btn btn-secondary" onclick="toggleFullscreen()">
                <span class="icon">⛶</span>
                <span>全屏切换</span>
            </button>
            <button class="control-btn btn-secondary" onclick="toggleVideo()">
                <span class="icon">▶</span>
                <span>重播视频</span>
            </button>
        </div>
    </div>

    <!-- 跳转区域 -->
    <div class="jump-section">
        <div class="jump-title">快速跳转</div>
        <div class="jump-input-row">
            <input type="number" class="jump-input" id="jumpInput" placeholder="输入页码" min="1" max="67">
            <button class="jump-btn" onclick="jumpTo()">跳转</button>
        </div>
        <div class="quick-pages">
            <button class="quick-page-btn" onclick="jumpTo(1)">视频</button>
            <button class="quick-page-btn" onclick="jumpTo(2)">座位</button>
            <button class="quick-page-btn" onclick="jumpTo(3)">签到</button>
            <button class="quick-page-btn" onclick="jumpTo(4)">主页</button>
            <button class="quick-page-btn" onclick="jumpTo(11)">宣讲员</button>
            <button class="quick-page-btn" onclick="jumpTo(16)">排行榜</button>
            <button class="quick-page-btn" onclick="jumpTo(31)">问答</button>
            <button class="quick-page-btn" onclick="jumpTo(67)">结束</button>
        </div>
    </div>

    <!-- 二维码 -->
    <div class="qr-section">
        <div class="qr-title">手机扫码打开控制页</div>
        <div class="qr-container">
            <canvas id="qrcode"></canvas>
        </div>
        <div class="qr-hint">扫描二维码在手机上打开此控制页面</div>
    </div>

    <!-- 演示页面链接 -->
    <div class="demo-link">
        演示页面: <a href="slides.html" target="_blank">点击打开</a>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        // 初始化 WebSocket 连接
        function connect() {
            const wsUrl = `ws://${window.location.hostname}:8765`;
            console.log('连接 WebSocket:', wsUrl);

            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('✅ WebSocket 连接成功');
                reconnectAttempts = 0;
                updateStatus(true);
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = function() {
                console.log('❌ WebSocket 连接断开');
                updateStatus(false);
                attemptReconnect();
            };

            ws.onerror = function(error) {
                console.error('WebSocket 错误:', error);
            };
        }

        // 尝试重连
        function attemptReconnect() {
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                console.log(`尝试重连 (${reconnectAttempts}/${maxReconnectAttempts})...`);
                setTimeout(connect, 2000);
            }
        }

        // 更新连接状态
        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (connected) {
                dot.classList.add('connected');
                text.textContent = '已连接';
            } else {
                dot.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        // 处理收到的消息
        function handleMessage(data) {
            switch(data.type) {
                case 'state':
                    updatePageDisplay(data.slide);
                    document.getElementById('clientCount').textContent = data.clients;
                    break;

                case 'goto':
                    updatePageDisplay(data.slide);
                    break;

                case 'next':
                    // 由演示页面处理，这里不更新
                    break;

                case 'prev':
                    // 由演示页面处理，这里不更新
                    break;

                case 'first':
                    updatePageDisplay('1');
                    break;

                case 'last':
                    updatePageDisplay('66');
                    break;

                case 'sync':
                    updatePageDisplay(data.slide);
                    break;

                case 'clients_count':
                    document.getElementById('clientCount').textContent = data.count;
                    break;
            }
        }

        // 更新页码显示
        function updatePageDisplay(slide) {
            let displayNum = slide;
            if (slide === '1') displayNum = '1';
            else if (slide === '1b') displayNum = '2';
            else displayNum = slide;

            document.getElementById('currentPage').textContent = displayNum;
        }

        // 发送消息
        function send(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
            }
        }

        // 控制函数
        function goNext() {
            send({ type: 'next' });
        }

        function goPrev() {
            send({ type: 'prev' });
        }

        function goFirst() {
            send({ type: 'first' });
        }

        function goLast() {
            send({ type: 'last' });
        }

        function jumpTo(page) {
            if (page === undefined) {
                page = document.getElementById('jumpInput').value;
            }
            if (page) {
                send({ type: 'goto', slide: String(page) });
                document.getElementById('jumpInput').value = '';
            }
        }

        function toggleFullscreen() {
            send({ type: 'fullscreen' });
        }

        function toggleVideo() {
            send({ type: 'replay_video' });
        }

        // 生成二维码
        function generateQR() {
            const url = window.location.href;
            const canvas = document.getElementById('qrcode');

            if (typeof QRCode !== 'undefined') {
                QRCode.toCanvas(canvas, url, {
                    width: 120,
                    margin: 1,
                    color: {
                        dark: '#003366',
                        light: '#ffffff'
                    }
                }, function(error) {
                    if (error) console.error('二维码生成失败:', error);
                });
            } else {
                // 如果 QRCode 库未加载，显示占位符
                const ctx = canvas.getContext('2d');
                canvas.width = 120;
                canvas.height = 120;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, 120, 120);
                ctx.fillStyle = '#999';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('QR Code', 60, 65);
            }
        }

        // 键盘支持（用于调试）
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                    e.preventDefault();
                    goNext();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    goPrev();
                    break;
                case 'Home':
                    e.preventDefault();
                    goFirst();
                    break;
                case 'End':
                    e.preventDefault();
                    goLast();
                    break;
            }
        });

        // 初始化
        connect();
        generateQR();
    </script>
</body>
</html>
