<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GSP 学习会 · AI 主持控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg-deep: #0b1120;
            --bg-base: #0f172a;
            --bg-elevated: #1a243b;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --bg-active: rgba(34, 197, 94, 0.12);
            --foreground: #f1f5f9;
            --foreground-muted: #94a3b8;
            --foreground-dim: #64748b;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.25);
            --accent-gradient: linear-gradient(135deg, #22c55e, #16a34a);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.04);
            --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.06);
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--foreground);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        input, textarea, button { font-family: inherit; }

        /* ===== Header ===== */
        .app-header {
            flex-shrink: 0;
            padding: 12px 16px;
            padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 10;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header .brand-icon {
            width: 32px; height: 32px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800; color: #fff;
            flex-shrink: 0;
        }
        .app-header .brand-text {
            line-height: 1.2;
        }
        .app-header .brand-name {
            font-size: 15px; font-weight: 700; color: var(--foreground);
        }
        .app-header .brand-sub {
            font-size: 11px; color: var(--foreground-muted); font-weight: 500;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255,255,255,0.06);
            color: var(--foreground-muted);
            transition: var(--transition);
        }
        .status-badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #ef4444;
            transition: var(--transition);
        }
        .status-badge .dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
        .status-badge .dot.connecting { background: var(--warning); animation: pulse-dot 1s ease infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .page-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--bg-card);
            color: var(--foreground-muted);
            white-space: nowrap;
        }
        .page-chip strong {
            color: var(--foreground);
            font-size: 14px;
        }

        /* ===== Main Content Area ===== */
        .tab-content-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .tab-pane {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 16px 24px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: opacity 250ms ease, transform 250ms ease, visibility 0ms 250ms;
            -webkit-overflow-scrolling: touch;
        }
        .tab-pane.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 300ms ease, transform 300ms ease, visibility 0ms 0ms;
        }

        /* ===== Bottom Tab Bar ===== */
        .tab-bar {
            flex-shrink: 0;
            display: flex;
            background: var(--bg-base);
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
            z-index: 10;
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            padding-top: 10px;
            border: none;
            background: transparent;
            color: var(--foreground-muted);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: color var(--transition);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            min-height: 52px;
        }
        .tab-item svg {
            width: 22px; height: 22px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            transition: var(--transition);
        }
        .tab-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            border-radius: 0 0 2px 2px;
            background: var(--accent);
            opacity: 0;
            transition: var(--transition);
        }
        .tab-item.active {
            color: var(--accent);
        }
        .tab-item.active::after {
            opacity: 1;
        }
        .tab-item:active {
            opacity: 0.7;
        }

        /* ===== Common Components ===== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .section-header svg {
            width: 18px; height: 18px;
            stroke: var(--accent);
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }
        .section-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--foreground);
        }
        .section-header .badge {
            margin-left: auto;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            background: var(--bg-card);
            color: var(--foreground-muted);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 12px;
            backdrop-filter: blur(8px);
            transition: border-color var(--transition);
        }
        .card:active {
            border-color: var(--border-hover);
        }
        .card-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--foreground-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            min-height: 40px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .btn-primary:hover { box-shadow: 0 4px 16px var(--accent-glow); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--foreground);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
        .btn-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .btn-warning:hover { background: rgba(245, 158, 11, 0.25); }
        .btn-sm { padding: 6px 12px; font-size: 11px; min-height: 32px; }
        .btn-lg { padding: 14px 24px; font-size: 15px; min-height: 48px; }
        .btn-block { width: 100%; }
        .btn-icon {
            width: 40px; height: 40px; padding: 0;
            border-radius: var(--radius-sm);
        }
        .btn-icon svg {
            width: 20px; height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-row .btn { flex: 1; min-width: 0; }

        /* ===== Input ===== */
        .input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.04);
            color: var(--foreground);
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            min-height: 42px;
        }
        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input::placeholder { color: var(--foreground-dim); }
        .input-group {
            display: flex;
            gap: 8px;
        }
        .input-group .input { flex: 1; }
        .textarea {
            width: 100%;
            min-height: 76px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.04);
            color: var(--foreground);
            font-size: 14px;
            font-weight: 500;
            resize: vertical;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            line-height: 1.6;
        }
        .textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .textarea::placeholder { color: var(--foreground-dim); }

        /* ===== Current Page Display ===== */
        .page-hero {
            text-align: center;
            padding: 12px 0 16px;
        }
        .page-hero .page-number {
            font-size: 64px;
            font-weight: 800;
            color: var(--foreground);
            line-height: 1;
            letter-spacing: -2px;
        }
        .page-hero .page-total {
            font-size: 14px;
            color: var(--foreground-muted);
            font-weight: 500;
            margin-top: 4px;
        }
        .page-hero .page-label {
            font-size: 12px;
            color: var(--foreground-dim);
            font-weight: 500;
            margin-bottom: 4px;
        }

        /* Navigation grid */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .nav-grid .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            color: var(--foreground);
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
            min-height: 64px;
        }
        .nav-grid .nav-btn:active { transform: scale(0.96); background: var(--bg-card-hover); }
        .nav-grid .nav-btn svg {
            width: 24px; height: 24px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
        }
        .nav-grid .nav-btn .nav-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--foreground-muted);
        }
        .nav-grid .nav-btn.primary-action {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .nav-grid .nav-btn.primary-action .nav-label { color: rgba(255,255,255,0.8); }
        .nav-grid .nav-btn.primary-action:active { box-shadow: 0 2px 8px var(--accent-glow); }

        .nav-btn-row {
            display: flex;
            gap: 8px;
        }
        .nav-btn-row .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            color: var(--foreground);
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
            min-height: 56px;
        }
        .nav-btn-row .nav-btn:active { transform: scale(0.96); background: var(--bg-card-hover); }
        .nav-btn-row .nav-btn svg {
            width: 20px; height: 20px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
        }
        .nav-btn-row .nav-btn .nav-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--foreground-muted);
        }

        /* ===== Score Cards ===== */
        .score-team {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            transition: border-color var(--transition);
        }
        .score-team .team-color {
            width: 3px; height: 32px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .score-team .team-info { flex: 1; min-width: 0; }
        .score-team .team-name {
            font-size: 14px; font-weight: 700; color: var(--foreground);
        }
        .score-team .team-score {
            font-size: 28px; font-weight: 800;
            color: var(--foreground);
            letter-spacing: -1px;
            min-width: 44px;
            text-align: center;
        }
        .score-team .score-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .score-team .score-actions button {
            width: 34px; height: 34px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
            color: #fff;
        }
        .score-team .score-actions button:active { transform: scale(0.9); }
        .score-team .score-actions .btn-add { background: var(--accent); }
        .score-team .score-actions .btn-sub { background: var(--danger); }
        .score-team .score-actions .btn-more {
            background: rgba(255,255,255,0.1);
            color: var(--foreground-muted);
            font-size: 16px;
            width: 28px;
        }

        /* ===== Leaderboard ===== */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }
        .leaderboard-item:last-child { border-bottom: none; }
        .leaderboard-item .rank {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.08); color: var(--foreground-muted); }
        .leaderboard-item .lb-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--foreground); }
        .leaderboard-item .lb-score { font-size: 15px; font-weight: 700; color: var(--accent); }

        /* ===== TTS Presets ===== */
        .tts-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .tts-preset-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            color: var(--foreground-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .tts-preset-btn:active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .tts-preset-btn:hover {
            border-color: var(--border-hover);
            color: var(--foreground);
        }

        /* ===== Game ===== */
        .game-status-card {
            text-align: center;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
        }
        .game-status-card .status-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .game-status-card .status-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--foreground-muted);
        }
        .game-status-card .round-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            margin-top: 4px;
        }

        .game-team-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .game-team-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
            transition: border-color var(--transition);
        }
        .game-team-card .gt-name {
            font-size: 15px; font-weight: 700;
            margin-bottom: 2px;
        }
        .game-team-card .gt-score {
            font-size: 28px; font-weight: 800;
            color: var(--foreground);
            letter-spacing: -1px;
            margin: 6px 0;
        }
        .game-team-card .gt-actions {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .game-team-card .gt-actions button {
            width: 36px; height: 36px;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
            color: #fff;
        }
        .game-team-card .gt-actions button:active { transform: scale(0.85); }

        /* ===== AI Chat ===== */
        .chat-history {
            max-height: 200px;
            overflow-y: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
        }
        .chat-history::-webkit-scrollbar { width: 3px; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .chat-message {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: flex-start;
        }
        .chat-message.user { flex-direction: row-reverse; }
        .chat-message .avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .chat-message .avatar.user-avatar {
            background: var(--accent-gradient);
            color: #fff;
        }
        .chat-message .avatar.ai-avatar {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }
        .chat-message .bubble {
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            line-height: 1.6;
            max-width: 80%;
            word-break: break-word;
        }
        .chat-message.user .bubble {
            background: var(--accent-gradient);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-message.ai .bubble {
            background: rgba(255,255,255,0.06);
            color: var(--foreground);
            border-bottom-left-radius: 4px;
        }
        .chat-empty {
            text-align: center;
            padding: 24px;
            color: var(--foreground-dim);
            font-size: 13px;
        }
        .chat-empty svg {
            width: 32px; height: 32px;
            stroke: var(--foreground-dim);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 8px;
        }

        /* ===== Jump Section ===== */
        .jump-row {
            display: flex;
            gap: 8px;
        }
        .jump-row .input { text-align: center; font-size: 18px; font-weight: 700; }
        .chapter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .chapter-chip {
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            color: var(--foreground-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .chapter-chip:active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ===== QR Code Section ===== */
        .qr-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-top: 12px;
        }
        .qr-section .qr-container {
            background: #fff;
            border-radius: var(--radius-sm);
            padding: 6px;
            flex-shrink: 0;
        }
        .qr-section #qrcode { width: 48px; height: 48px; display: block; }
        .qr-section .qr-info { flex: 1; min-width: 0; }
        .qr-section .qr-label { font-size: 11px; color: var(--foreground-muted); font-weight: 500; }
        .qr-section .qr-hint { font-size: 10px; color: var(--foreground-dim); margin-top: 2px; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ===== Demo Link ===== */
        .demo-link {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: var(--foreground-dim);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg-base);
        }
        .demo-link a { color: var(--foreground-muted); text-decoration: none; }
        .demo-link a:hover { color: var(--foreground); }

        /* ===== Scrollbar ===== */
        .tab-pane::-webkit-scrollbar { width: 3px; }
        .tab-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ===== Responsive ===== */
        @media (min-width: 480px) {
            .tab-pane { padding: 20px 24px 24px; }
            .page-hero .page-number { font-size: 72px; }
            .game-team-grid { grid-template-columns: 1fr 1fr 1fr; }
        }
        @media (min-width: 768px) {
            body { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
            .game-team-grid { grid-template-columns: 1fr 1fr; }
        }

        /* No maximum-scale zoom disable - keep accessibility */
    </style>
</head>

    <script src="/static/js/slide-store.js"></script>
    <script>
        (function() {
            const app = {
                store: new SlideStore(),
                teamsCache: [],
                gameTeams: ['A队', 'B队', 'C队', 'D队'],
                teamColors: { 'A队': '#22c55e', 'B队': '#3b82f6', 'C队': '#f59e0b', 'D队': '#ef4444' },

                init: function() {
                    const self = this;

                    // ---- WS Event Bindings ----
                    this.store.onCurrentSlideChange = function(slideId, position, total) {
                        document.getElementById('currentPage').textContent = position;
                        document.getElementById('currentSlideDisplay').textContent = position;
                        document.getElementById('totalPages').textContent = total;
                        const jumpInput = document.getElementById('jumpInput');
                        if (jumpInput) jumpInput.max = total;
                    };

                    this.store.onConnectionStatusChange = function(status) {
                        const dot = document.getElementById('statusDot');
                        const text = document.getElementById('statusText');
                        dot.className = 'dot';
                        if (status === 'connected') {
                            dot.classList.add('connected');
                            text.textContent = '已连接';
                        } else if (status === 'connecting') {
                            dot.classList.add('connecting');
                            text.textContent = '连接中';
                        } else {
                            text.textContent = '未连接';
                        }
                    };

                    this.store.ws.on('clients_count', function(data) {
                        // could show count in badge
                    });

                    this.store.ws.on('score_board', function(data) {
                        self.teamsCache = data.teams || [];
                        self.renderScoreBoard(self.teamsCache);
                        self.renderLeaderboard(self.teamsCache);
                        self.renderGameTeamGrid(self.teamsCache);
                        document.getElementById('scoreCount').textContent = self.teamsCache.length + ' 队';
                    });

                    this.store.ws.on('score_update', function(data) {
                        self.updateSingleScore(data.team_name, data.score);
                    });

                    this.store.ws.on('score_set', function(data) {
                        self.updateSingleScore(data.team_name, data.score);
                    });

                    this.store.ws.on('score_reset', function(data) {
                        self.teamsCache = data.teams || [];
                        self.renderScoreBoard(self.teamsCache);
                        self.renderLeaderboard(self.teamsCache);
                        self.renderGameTeamGrid(self.teamsCache);
                    });

                    this.store.ws.on('game_control', function(data) {
                        self.handleGameControl(data);
                    });

                    this.store.ws.on('ai_realtime_status', function(data) {
                        self.handleRealtimeStatus(data);
                    });
                    this.store.ws.on('ai_realtime_text_delta', function(data) {
                        self.appendRealtimeText(data.delta);
                    });
                    this.store.ws.on('ai_realtime_text_done', function(data) {
                        self.finishRealtimeText(data.text);
                    });

                    // ---- Init ----
                    this.store.init().then(function() {
                        self.updateChapterChips();
                        self.requestScores();
                    });

                    this.bindTabs();
                    this.bindKeyboard();
                    this.generateQR();
                },

                // ===== Navigation =====
                next: function() { this.store.next(); },
                prev: function() { this.store.prev(); },
                first: function() { this.store.first(); },
                last: function() { this.store.last(); },
                jumpTo: function(page) {
                    if (page === undefined) page = document.getElementById('jumpInput').value;
                    if (page) {
                        this.store.gotoPosition(parseInt(page));
                        document.getElementById('jumpInput').value = '';
                    }
                },
                toggleFullscreen: function() { this.store.toggleFullscreen(); },
                replayVideo: function() { this.store.replayVideo(); },
                toggleDisplayMode: function() {
                    var current = this._displayMode || 'fill';
                    var next = current === 'fill' ? '16-9' : 'fill';
                    this._displayMode = next;
                    this.store.send({ type: 'display_mode', mode: next });
                    // 更新按钮状态
                    var btn = document.getElementById('displayModeBtn');
                    var label = document.getElementById('displayModeLabel');
                    var icon = document.getElementById('displayModeIcon');
                    if (next === '16-9') {
                        label.textContent = '16:9';
                        btn.style.borderColor = 'var(--accent)';
                        btn.style.background = 'var(--bg-active)';
                        label.style.color = 'var(--accent)';
                        this.showToast('📐 已切换 16:9 模式');
                    } else {
                        label.textContent = '撑满';
                        btn.style.borderColor = '';
                        btn.style.background = '';
                        label.style.color = '';
                        this.showToast('🖥️ 已切换撑满模式');
                    }
                },

                updateChapterChips: function() {
                    const container = document.getElementById('chapterChips');
                    if (!container) return;
                    const slides = this.store.slides;
                    const seen = new Set();
                    const chips = [];
                    slides.forEach(function(s, idx) {
                        if (s.chapter && !seen.has(s.chapter)) {
                            seen.add(s.chapter);
                            chips.push('<button class="chapter-chip" onclick="app.jumpTo(' + (idx + 1) + ')">' + escapeHtml(s.chapter) + '</button>');
                        }
                    });
                    container.innerHTML = chips.join('');
                },

                // ===== Scores =====
                requestScores: function() { this.store.send({ type: 'score_get' }); },
                requestLeaderboard: function() { this.store.send({ type: 'score_leaderboard' }); },
                updateScore: function(teamName, delta, autoTts) {
                    this.store.send({ type: 'score_update', team_name: teamName, delta: delta, auto_tts: autoTts || false });
                },
                updateSingleScore: function(teamName, score) {
                    var idx = this.teamsCache.findIndex(function(t) { return t.team_name === teamName; });
                    if (idx >= 0) this.teamsCache[idx].score = score;
                    this.renderScoreBoard(this.teamsCache);
                    this.renderLeaderboard(this.teamsCache);
                    this.renderGameTeamGrid(this.teamsCache);
                },
                customScore: function(teamName) {
                    var input = prompt('输入 ' + teamName + ' 的加减分数', '0');
                    if (input !== null) {
                        var delta = parseInt(input);
                        if (!isNaN(delta)) this.updateScore(teamName, delta, false);
                    }
                },
                resetAllScores: function() {
                    if (confirm('确认重置所有队伍积分？')) {
                        this.store.send({ type: 'score_reset' });
                        this.showToast('积分已重置');
                    }
                },
                renderScoreBoard: function(teams) {
                    this.teamsCache = teams || [];
                    var container = document.getElementById('scoreList');
                    if (!teams || teams.length === 0) {
                        container.innerHTML = '<div class="card" style="text-align:center;padding:24px;color:var(--foreground-dim);font-size:13px;">暂无队伍数据</div>';
                        return;
                    }
                    var colors = this.teamColors;
                    var self = this;
                    container.innerHTML = teams.map(function(t) {
                        var color = colors[t.team_name] || '#22c55e';
                        return '<div class="score-team">' +
                            '<div class="team-color" style="background:' + color + ';"></div>' +
                            '<div class="team-info"><div class="team-name">' + escapeHtml(t.team_name) + '</div></div>' +
                            '<div class="team-score" id="score-' + t.team_name + '">' + t.score + '</div>' +
                            '<div class="score-actions">' +
                            '<button class="btn-add" onclick="app.updateScore(\'' + t.team_name + '\', 10, true)" title="加10分">+10</button>' +
                            '<button class="btn-add" onclick="app.updateScore(\'' + t.team_name + '\', 5, false)" title="加5分">+5</button>' +
                            '<button class="btn-sub" onclick="app.updateScore(\'' + t.team_name + '\', -5, false)" title="减5分">-5</button>' +
                            '<button class="btn-sub" onclick="app.updateScore(\'' + t.team_name + '\', -10, false)" title="减10分">-10</button>' +
                            '<button class="btn-more" onclick="app.customScore(\'' + t.team_name + '\')" title="自定义">✏️</button>' +
                            '</div></div>';
                    }).join('');
                },
                renderLeaderboard: function(teams) {
                    var container = document.getElementById('leaderboardList');
                    if (!teams || teams.length === 0) {
                        container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--foreground-dim);font-size:13px;">暂无数据</div>';
                        return;
                    }
                    var sorted = teams.slice().sort(function(a, b) { return b.score - a.score; });
                    container.innerHTML = sorted.map(function(t, i) {
                        var rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                        return '<div class="leaderboard-item"><div class="rank ' + rankClass + '">' + (i + 1) + '</div><div class="lb-name">' + escapeHtml(t.team_name) + '</div><div class="lb-score">' + t.score + '</div></div>';
                    }).join('');
                },
                renderGameTeamGrid: function(teams) {
                    var grid = document.getElementById('gameTeamGrid');
                    if (!grid) return;
                    var scoreMap = {};
                    (teams || []).forEach(function(t) { scoreMap[t.team_name] = t.score; });
                    var colors = this.teamColors;
                    var self = this;
                    grid.innerHTML = this.gameTeams.map(function(tname) {
                        var score = scoreMap[tname] || 0;
                        var color = colors[tname] || '#22c55e';
                        return '<div class="game-team-card" style="border-color:' + color + '40;">' +
                            '<div class="gt-name" style="color:' + color + ';">' + escapeHtml(tname) + '</div>' +
                            '<div class="gt-score" id="gameScore-' + tname + '">' + score + '</div>' +
                            '<div class="gt-actions">' +
                            '<button style="background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 1)" title="+1">+1</button>' +
                            '<button style="background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 2)" title="+2">+2</button>' +
                            '<button style="background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 5)" title="+5">+5</button>' +
                            '<button style="background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 10)" title="+10">+10</button>' +
                            '<button class="btn-sub" style="width:36px;height:36px;border-radius:50%;font-size:16px;font-weight:700;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="app.gameScore(\'' + tname + '\', -1)" title="-1">-1</button>' +
                            '<button class="btn-sub" style="width:36px;height:36px;border-radius:50%;font-size:16px;font-weight:700;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="app.gameScore(\'' + tname + '\', -5)" title="-5">-5</button>' +
                            '</div></div>';
                    }).join('');
                },
                gameScore: function(teamName, delta) {
                    this.store.send({ type: 'score_update', team_name: teamName, delta: delta, auto_tts: true });
                    this.showToast('⚡ ' + teamName + ' ' + (delta > 0 ? '+' : '') + delta);
                },

                // ===== TTS =====
                setTtsText: function(text) { document.getElementById('ttsText').value = text; },
                speakTts: function() {
                    var text = document.getElementById('ttsText').value.trim();
                    if (!text) { this.showToast('请输入播报内容'); return; }
                    this.store.send({ type: 'tts_speak', text: text, voice: '' });
                    this.showToast('📢 播报请求已发送');
                },
                stopTts: function() { this.store.send({ type: 'tts_stop' }); this.showToast('⏹ 播报已停止'); },

                // ===== Game =====
                startGame: function() {
                    var name = document.getElementById('roundNameInput').value.trim() || '知识问答';
                    this.store.send({ type: 'game_control', action: 'start', round_name: name });
                    this.showToast('▶ 环节已开始: ' + name);
                },
                endGame: function() { this.store.send({ type: 'game_control', action: 'end' }); this.showToast('⏸ 环节已结束'); },
                resetGame: function() {
                    if (confirm('确认重置游戏（将清除所有积分）？')) {
                        this.store.send({ type: 'game_control', action: 'reset' });
                        this.showToast('🔄 游戏已重置');
                    }
                },
                handleGameControl: function(data) {
                    var icon = document.getElementById('gameStatusIcon');
                    var text = document.getElementById('gameStatusText');
                    var name = document.getElementById('gameRoundName');
                    if (data.action === 'started') {
                        icon.textContent = '▶'; text.textContent = '游戏进行中'; name.textContent = data.round_name || '';
                    } else if (data.action === 'ended') {
                        icon.textContent = '⏹'; text.textContent = '游戏已结束'; name.textContent = '';
                    } else if (data.action === 'reset') {
                        icon.textContent = '⏹'; text.textContent = '游戏未开始'; name.textContent = '';
                    }
                },

                // ===== AI =====
                askAI: function() {
                    var input = document.getElementById('aiQuestionInput');
                    var text = input.value.trim();
                    if (!text) return;
                    input.value = '';
                    if (!this._aiRealtimeReady) {
                        this._pendingAIQuestion = text;
                        this.addAIChatMessage('ai', '正在连接实时 AI…', true);
                        this.store.send({ type: 'ai_realtime_start', audio: false });
                        return;
                    }
                    this.sendRealtimeText(text);
                },
                sendRealtimeText: function(text) {
                    this.addAIChatMessage('user', text);
                    this.addAIChatMessage('ai', '', true);
                    this.store.send({ type: 'ai_realtime_text', text: text });
                },
                addAIChatMessage: function(role, text, isTemp) {
                    var history = document.getElementById('aiChatHistory');
                    var empty = document.getElementById('aiChatEmpty');
                    if (empty) empty.style.display = 'none';
                    if (isTemp) {
                        var existing = history.querySelector('.chat-message.temp');
                        if (existing) existing.remove();
                    }
                    var msg = document.createElement('div');
                    msg.className = 'chat-message ' + (isTemp ? 'temp' : '') + ' ' + role;
                    var avatarHtml = role === 'user'
                        ? '<div class="avatar user-avatar">👤</div>'
                        : '<div class="avatar ai-avatar">🤖</div>';
                    msg.innerHTML = avatarHtml + '<div class="bubble">' + escapeHtml(text) + '</div>';
                    history.appendChild(msg);
                    history.scrollTop = history.scrollHeight;
                },
                clearAIChat: function() {
                    document.getElementById('aiChatHistory').innerHTML = '<div class="chat-empty" id="aiChatEmpty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg><div>开始与 AI 对话吧！</div></div>';
                    this._aiRealtimeReady = false;
                    this._pendingAIQuestion = null;
                    this.store.send({ type: 'ai_realtime_clear', audio: false });
                },
                handleRealtimeStatus: function(data) {
                    if (data.status === 'ready') {
                        this._aiRealtimeReady = true;
                        if (this._pendingAIQuestion) {
                            var question = this._pendingAIQuestion;
                            this._pendingAIQuestion = null;
                            var placeholder = document.querySelector('#aiChatHistory .chat-message.temp');
                            if (placeholder) placeholder.remove();
                            this.sendRealtimeText(question);
                        }
                    } else if (data.status === 'error') {
                        this._aiRealtimeReady = false;
                        if (data.message) this.showToast(data.message);
                    }
                },
                appendRealtimeText: function(delta) {
                    if (!delta) return;
                    var history = document.getElementById('aiChatHistory');
                    var temp = history.querySelector('.chat-message.temp');
                    if (!temp) {
                        this.addAIChatMessage('ai', '', true);
                        temp = history.querySelector('.chat-message.temp');
                    }
                    var bubble = temp.querySelector('.bubble');
                    bubble.textContent += delta;
                    history.scrollTop = history.scrollHeight;
                },
                finishRealtimeText: function(text) {
                    var history = document.getElementById('aiChatHistory');
                    var temp = history.querySelector('.chat-message.temp');
                    if (!temp) {
                        if (text) this.addAIChatMessage('ai', text);
                        return;
                    }
                    var bubble = temp.querySelector('.bubble');
                    if (text) bubble.textContent = text;
                    temp.classList.remove('temp');
                },
                toggleVoiceInput: function() {
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        this.showToast('⚠ 您的浏览器不支持语音识别，请使用 Chrome'); return;
                    }
                    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    var recognition = new SpeechRecognition();
                    recognition.lang = 'zh-CN'; recognition.continuous = false; recognition.interimResults = false;
                    var btn = document.getElementById('aiVoiceBtn');
                    var self = this;
                    btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" style="stroke:currentColor;fill:none;stroke-width:2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg> 录音中...';
                    btn.style.background = 'rgba(239,68,68,0.2)';
                    btn.style.color = '#ef4444';
                    recognition.onresult = function(event) {
                        document.getElementById('aiQuestionInput').value = event.results[0][0].transcript;
                        self.askAI();
                        btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" style="stroke:currentColor;fill:none;stroke-width:2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg> 语音输入';
                        btn.style.background = '';
                        btn.style.color = '';
                    };
                    recognition.onerror = function() {
                        self.showToast('⚠ 语音识别失败，请重试');
                        btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" style="stroke:currentColor;fill:none;stroke-width:2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg> 语音输入';
                        btn.style.background = '';
                        btn.style.color = '';
                    };
                    recognition.onend = function() {
                        btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" style="stroke:currentColor;fill:none;stroke-width:2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg> 语音输入';
                        btn.style.background = '';
                        btn.style.color = '';
                    };
                    recognition.start();
                },

                // ===== Common =====
                bindTabs: function() {
                    var self = this;
                    document.querySelectorAll('.tab-item').forEach(function(item) {
                        item.addEventListener('click', function() {
                            document.querySelectorAll('.tab-item').forEach(function(b) { b.classList.remove('active'); });
                            document.querySelectorAll('.tab-pane').forEach(function(c) { c.classList.remove('active'); });
                            item.classList.add('active');
                            document.getElementById('pane-' + item.dataset.tab).classList.add('active');
                            if (item.dataset.tab === 'scores') self.requestScores();
                        });
                    });
                },
                bindKeyboard: function() {
                    document.addEventListener('keydown', function(e) {
                        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                        switch(e.key) {
                            case 'ArrowRight': case ' ': e.preventDefault(); app.next(); break;
                            case 'ArrowLeft': e.preventDefault(); app.prev(); break;
                            case 'Home': e.preventDefault(); app.first(); break;
                            case 'End': e.preventDefault(); app.last(); break;
                        }
                    });
                },
                generateQR: function() {
                    var url = window.location.href;
                    var canvas = document.getElementById('qrcode');
                    if (typeof QRCode !== 'undefined') {
                        QRCode.toCanvas(canvas, url, { width: 48, margin: 1, color: { dark: '#003366', light: '#ffffff' } }, function(error) {
                            if (error) console.error('QR failed:', error);
                        });
                    }
                },
                showToast: function(message) {
                    var el = document.getElementById('toast');
                    el.textContent = message;
                    el.classList.add('show');
                    clearTimeout(this.toastTimer);
                    this.toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
                }
            };

            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            window.app = app;
            app.init();
        })();
    </script>
</body>
</html>
