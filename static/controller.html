<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSP 学习会 - AI 主持控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #003366 0%, #004d99 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            user-select: none;
        }

        /* 头部 */
        .header {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .logo { font-size: 22px; font-weight: bold; }
        .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #e74c3c;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #2ecc71; }

        /* Tab 导航 */
        .tab-bar {
            display: flex;
            background: rgba(0,0,0,0.25);
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1;
            min-width: 60px;
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            border: none;
            background: transparent;
            transition: all 0.2s;
            position: relative;
            white-space: nowrap;
        }
        .tab-btn.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #2ecc71;
            border-radius: 3px 3px 0 0;
        }
        .tab-btn .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* Tab 内容容器 */
        .tab-content {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .tab-content.active { display: block; }

        /* ========== 公用小组件 ========== */
        .section { padding: 16px; }
        .section-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            color: white;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #f39c12; }
        .btn-secondary { background: rgba(255,255,255,0.2); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-lg { padding: 14px 24px; font-size: 16px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .input {
            padding: 10px 14px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .input:focus { border-color: #2ecc71; }
        .input::placeholder { color: rgba(255,255,255,0.4); }
        .input-group { display: flex; gap: 8px; }
        .input-group .input { flex: 1; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            background: rgba(255,255,255,0.15);
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }
        .toast.show { opacity: 1; }

        /* ========== Tab 1: 遥控 ========== */
        .current-page {
            text-align: center;
            padding: 16px 20px 8px;
        }
        .page-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
        .page-number { font-size: 56px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .page-total { font-size: 16px; opacity: 0.6; }

        .control-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .control-btn {
            flex: 1;
            padding: 14px 8px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.92);
            color: #003366;
        }
        .control-btn:active { transform: scale(0.94); }
        .control-btn .icon { font-size: 22px; }
        .control-btn.secondary { background: rgba(255,255,255,0.18); color: white; }

        .jump-section { padding: 0 16px; }
        .jump-input-row { display: flex; gap: 8px; }
        .jump-input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
        }
        .jump-input:focus { border-color: #2ecc71; }

        .quick-pages {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .quick-page-btn {
            padding: 7px 12px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .quick-page-btn:active { background: rgba(255,255,255,0.2); }

        .qr-section { padding: 16px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px; }
        .qr-container { display: inline-block; padding: 10px; background: white; border-radius: 10px; }
        #qrcode { width: 100px; height: 100px; }
        .qr-hint { font-size: 11px; opacity: 0.6; margin-top: 6px; }

        /* ========== Tab 2: 积分管理 ========== */
        .score-team {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            margin-bottom: 8px;
            gap: 10px;
        }
        .score-team .name { flex: 1; font-size: 15px; font-weight: bold; }
        .score-team .score { font-size: 24px; font-weight: bold; min-width: 40px; text-align: center; }
        .score-team .score-actions { display: flex; gap: 4px; }
        .score-team .score-actions button {
            width: 36px; height: 36px;
            border: none; border-radius: 6px;
            font-size: 18px; font-weight: bold;
            cursor: pointer; color: white;
            transition: all 0.1s;
        }
        .score-team .score-actions button:active { transform: scale(0.9); }
        .btn-score-add { background: #2ecc71; }
        .btn-score-sub { background: #e74c3c; }
        .btn-score-custom {
            background: rgba(255,255,255,0.15);
            font-size: 14px !important;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            margin-bottom: 6px;
            gap: 12px;
        }
        .leaderboard-item .rank {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold;
        }
        .rank-1 { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .rank-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); }
        .rank-3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .rank-other { background: rgba(255,255,255,0.15); }

        /* ========== Tab 3: 语音播报 ========== */
        .tts-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .tts-preset-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .tts-preset-btn:active { background: rgba(255,255,255,0.2); }
        .tts-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 14px;
            resize: vertical;
            outline: none;
            font-family: inherit;
            line-height: 1.6;
        }
        .tts-textarea:focus { border-color: #2ecc71; }
        .tts-textarea::placeholder { color: rgba(255,255,255,0.4); }

        /* ========== Tab 4: 游戏控制 ========== */
        .game-status {
            text-align: center;
            padding: 20px;
        }
        .game-status .status-icon { font-size: 40px; margin-bottom: 8px; }
        .game-status .status-text { font-size: 16px; opacity: 0.8; }
        .game-round-name { font-size: 20px; font-weight: bold; margin-top: 4px; }

        .demo-link { text-align: center; padding: 12px; font-size: 12px; opacity: 0.6; }
        .demo-link a { color: white; }
    </style>
</head>

<!-- 头部 -->
<div class="header">

<script>
    // ==================== WebSocket 连接 ====================
    let ws = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 20;

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        console.log('连接 WebSocket:', wsUrl);

        ws = new WebSocket(wsUrl);

        ws.onopen = function() {
            console.log('✅ WebSocket 连接成功');
            reconnectAttempts = 0;
            updateStatus(true);
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };

        ws.onclose = function() {
            console.log('❌ WebSocket 连接断开');
            updateStatus(false);
            attemptReconnect();
        };

        ws.onerror = function(error) {
            console.error('WebSocket 错误:', error);
        };
    }

    function attemptReconnect() {
        if (reconnectAttempts < maxReconnectAttempts) {
            reconnectAttempts++;
            setTimeout(connect, 2000);
        }
    }

    function updateStatus(connected) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.classList.toggle('connected', connected);
        text.textContent = connected ? '已连接' : '未连接';
    }

    // ==================== 消息处理 ====================
    function handleMessage(data) {
        switch(data.type) {
            case 'state':
                updatePageDisplay(data.slide);
                document.getElementById('clientCount').textContent = data.clients;
                break;

            case 'goto':
                updatePageDisplay(data.slide);
                break;

            case 'sync':
                updatePageDisplay(data.slide);
                break;

            case 'first':
                updatePageDisplay('1');
                break;

            case 'last':
                updatePageDisplay('66');
                break;

            case 'clients_count':
                document.getElementById('clientCount').textContent = data.count;
                break;

            // 游戏积分
            case 'score_update':
                updateSingleScore(data.team_name, data.score);
                break;

            case 'score_set':
                updateSingleScore(data.team_name, data.score);
                break;

            case 'score_board':
                renderScoreBoard(data.teams);
                if (data.leaderboard) {
                    renderLeaderboard(data.teams);
                }
                break;

            case 'score_reset':
                if (data.teams) {
                    renderScoreBoard(data.teams);
                    renderLeaderboard(data.teams);
                }
                break;

            case 'game_control':
                handleGameControl(data);
                break;
        }
    }

    // ==================== 幻灯片控制 ====================
    function updatePageDisplay(slide) {
        let displayNum = slide;
        if (slide === '1') displayNum = '1';
        else if (slide === '1b') displayNum = '2';
        else displayNum = slide;
        document.getElementById('currentPage').textContent = displayNum;
        document.getElementById('currentSlideDisplay').textContent = displayNum;
    }

    function send(message) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(message));
        }
    }

    function goNext() { send({ type: 'next' }); }
    function goPrev() { send({ type: 'prev' }); }
    function goFirst() { send({ type: 'first' }); }
    function goLast() { send({ type: 'last' }); }

    function jumpTo(page) {
        if (page === undefined) {
            page = document.getElementById('jumpInput').value;
        }
        if (page) {
            send({ type: 'goto', slide: String(page) });
            document.getElementById('jumpInput').value = '';
        }
    }

    function toggleFullscreen() { send({ type: 'fullscreen' }); }
    function toggleVideo() { send({ type: 'replay_video' }); }

    // ==================== 积分管理 ====================
    let teamsCache = [];

    function requestScores() {
        send({ type: 'score_get' });
    }

    function requestLeaderboard() {
        send({ type: 'score_leaderboard' });
    }

    function updateScore(teamName, delta, autoTts) {
        send({
            type: 'score_update',
            team_name: teamName,
            delta: delta,
            auto_tts: autoTts || false,
        });
    }

    function updateSingleScore(teamName, score) {
        // Update cache
        const idx = teamsCache.findIndex(t => t.team_name === teamName);
        if (idx >= 0) {
            teamsCache[idx].score = score;
        }
        renderScoreBoard(teamsCache);
        renderLeaderboard(teamsCache);
    }

    function customScore(teamName) {
        const input = prompt(`输入 ${teamName} 的新分数（正负数均可，当前为加减操作）`, '0');
        if (input !== null) {
            const delta = parseInt(input);
            if (!isNaN(delta)) {
                updateScore(teamName, delta, false);
            }
        }
    }

    function resetAllScores() {
        if (confirm('确认重置所有队伍积分？')) {
            send({ type: 'score_reset' });
            showToast('积分已重置');
        }
    }

    function renderScoreBoard(teams) {
        teamsCache = teams || [];
        const container = document.getElementById('scoreList');
        if (!teams || teams.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">暂无队伍数据</div>';
            return;
        }

        container.innerHTML = teams.map(t => `
            <div class="score-team">
                <div class="name">${t.team_name}</div>
                <div class="score" id="score-${t.team_name}">${t.score}</div>
                <div class="score-actions">
                    <button class="btn-score-add" onclick="updateScore('${t.team_name}', 10, true)" title="加10分">+10</button>
                    <button class="btn-score-add" onclick="updateScore('${t.team_name}', 5, false)" title="加5分">+5</button>
                    <button class="btn-score-sub" onclick="updateScore('${t.team_name}', -5, false)" title="减5分">-5</button>
                    <button class="btn-score-sub" onclick="updateScore('${t.team_name}', -10, false)" title="减10分">-10</button>
                    <button class="btn-score-custom" onclick="customScore('${t.team_name}')" title="自定义">✏️</button>
                </div>
            </div>
        `).join('');
    }

    function renderLeaderboard(teams) {
        const container = document.getElementById('leaderboardList');
        if (!teams || teams.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">暂无数据</div>';
            return;
        }

        // Sort by score descending
        const sorted = [...teams].sort((a, b) => b.score - a.score);

        container.innerHTML = sorted.map((t, i) => {
            const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
            return `
                <div class="leaderboard-item">
                    <div class="rank ${rankClass}">${i + 1}</div>
                    <div style="flex:1; font-weight:bold;">${t.team_name}</div>
                    <div style="font-size:18px; font-weight:bold;">${t.score}</div>
                </div>
            `;
        }).join('');
    }

    // ==================== TTS 语音播报 ====================
    function setTtsText(text) {
        document.getElementById('ttsText').value = text;
    }

    function speakTts() {
        const text = document.getElementById('ttsText').value.trim();
        if (!text) {
            showToast('请输入播报内容');
            return;
        }
        send({ type: 'tts_speak', text: text, voice: '' });
        showToast('📢 播报请求已发送');
    }

    function stopTts() {
        send({ type: 'tts_stop' });
        showToast('⏹ 播报已停止');
    }

    // ==================== 游戏控制 ====================
    function startGame() {
        const name = document.getElementById('roundNameInput').value.trim() || '知识问答';
        send({ type: 'game_control', action: 'start', round_name: name });
        showToast(`▶ 环节已开始: ${name}`);
    }

    function endGame() {
        send({ type: 'game_control', action: 'end' });
        showToast('⏸ 环节已结束');
    }

    function resetGame() {
        if (confirm('确认重置游戏（将清除所有积分）？')) {
            send({ type: 'game_control', action: 'reset' });
            showToast('🔄 游戏已重置');
        }
    }

    function handleGameControl(data) {
        const icon = document.getElementById('gameStatusIcon');
        const text = document.getElementById('gameStatusText');
        const name = document.getElementById('gameRoundName');

        if (data.action === 'started') {
            icon.textContent = '▶';
            text.textContent = '游戏进行中';
            name.textContent = data.round_name || '';
        } else if (data.action === 'ended') {
            icon.textContent = '⏹';
            text.textContent = '游戏已结束';
            name.textContent = '';
        } else if (data.action === 'reset') {
            icon.textContent = '⏹';
            text.textContent = '游戏未开始';
            name.textContent = '';
        }
    }

    // ==================== 视频控制 ====================
    function playVideo(videoFile) {
        send({ type: 'video_play', file: videoFile });
        showToast(`▶ 播放视频: ${videoFile}`);
    }

    // ==================== 二维码 ====================
    function generateQR() {
        const url = window.location.href;
        const canvas = document.getElementById('qrcode');
        if (typeof QRCode !== 'undefined') {
            QRCode.toCanvas(canvas, url, {
                width: 100, margin: 1,
                color: { dark: '#003366', light: '#ffffff' }
            }, function(error) {
                if (error) console.error('二维码生成失败:', error);
            });
        }
    }

    // ==================== Toast 提示 ====================
    let toastTimer = null;

    function showToast(message) {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ==================== Tab 切换 ====================
    document.addEventListener('click', function(e) {
        const tabBtn = e.target.closest('.tab-btn');
        if (!tabBtn) return;

        // 切换 Tab
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tabBtn.classList.add('active');
        document.getElementById('tab-' + tabBtn.dataset.tab).classList.add('active');

        // 切换到积分 Tab 时自动刷新
        if (tabBtn.dataset.tab === 'scores') {
            requestScores();
        }
    });

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
        switch(e.key) {
            case 'ArrowRight':
            case ' ':
                e.preventDefault(); goNext(); break;
            case 'ArrowLeft':
                e.preventDefault(); goPrev(); break;
            case 'Home':
                e.preventDefault(); goFirst(); break;
            case 'End':
                e.preventDefault(); goLast(); break;
        }
    });

    // ==================== 初始化 ====================
    connect();
    generateQR();

    // 页面加载后自动请求积分
    setTimeout(() => requestScores(), 1000);
</script>
</body>
</html>
