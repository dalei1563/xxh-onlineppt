<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSP 学习会 - AI 主持控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #003366 0%, #004d99 100%); min-height: 100vh; display: flex; flex-direction: column; color: white; user-select: none; }
        .header { padding: 16px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
        .logo { font-size: 22px; font-weight: bold; }
        .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; transition: background 0.3s; }
        .status-dot.connected { background: #2ecc71; }
        .tab-bar { display: flex; background: rgba(0,0,0,0.25); flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-btn { flex: 1; min-width: 60px; padding: 12px 8px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; border: none; background: transparent; transition: all 0.2s; position: relative; white-space: nowrap; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: #2ecc71; border-radius: 3px 3px 0 0; }
        .tab-btn .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
        .tab-content { flex: 1; display: none; overflow-y: auto; padding-bottom: 20px; }
        .tab-content.active { display: block; }
        .section { padding: 16px; }
        .section-title { font-size: 14px; opacity: 0.8; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.15s; color: white; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #f39c12; }
        .btn-secondary { background: rgba(255,255,255,0.2); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-lg { padding: 14px 24px; font-size: 16px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .input { padding: 10px 14px; border: 2px solid rgba(255,255,255,0.25); border-radius: 8px; background: rgba(255,255,255,0.08); color: white; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: #2ecc71; }
        .input::placeholder { color: rgba(255,255,255,0.4); }
        .input-group { display: flex; gap: 8px; }
        .input-group .input { flex: 1; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: rgba(255,255,255,0.15); }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center; }
        .toast.show { opacity: 1; }
        .current-page { text-align: center; padding: 16px 20px 8px; }
        .page-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
        .page-number { font-size: 56px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .page-total { font-size: 16px; opacity: 0.6; }
        .control-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .control-btn { flex: 1; padding: 14px 8px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; background: rgba(255,255,255,0.92); color: #003366; }
        .control-btn:active { transform: scale(0.94); }
        .control-btn .icon { font-size: 22px; }
        .control-btn.secondary { background: rgba(255,255,255,0.18); color: white; }
        .jump-section { padding: 0 16px; }
        .jump-input-row { display: flex; gap: 8px; }
        .jump-input { flex: 1; padding: 12px; border: 2px solid rgba(255,255,255,0.25); border-radius: 8px; background: rgba(255,255,255,0.08); color: white; font-size: 18px; text-align: center; outline: none; }
        .jump-input:focus { border-color: #2ecc71; }
        .quick-pages { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .quick-page-btn { padding: 7px 12px; border: 1px solid rgba(255,255,255,0.25); border-radius: 6px; background: rgba(255,255,255,0.08); color: white; font-size: 12px; cursor: pointer; }
        .quick-page-btn:active { background: rgba(255,255,255,0.2); }
        .qr-section { padding: 16px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px; }
        .qr-container { display: inline-block; padding: 10px; background: white; border-radius: 10px; }
        #qrcode { width: 100px; height: 100px; }
        .qr-hint { font-size: 11px; opacity: 0.6; margin-top: 6px; }
        .score-team { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.08); border-radius: 8px; margin-bottom: 8px; gap: 10px; }
        .score-team .name { flex: 1; font-size: 15px; font-weight: bold; }
        .score-team .score { font-size: 24px; font-weight: bold; min-width: 40px; text-align: center; }
        .score-team .score-actions { display: flex; gap: 4px; }
        .score-team .score-actions button { width: 36px; height: 36px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: all 0.1s; }
        .score-team .score-actions button:active { transform: scale(0.9); }
        .btn-score-add { background: #2ecc71; }
        .btn-score-sub { background: #e74c3c; }
        .btn-score-custom { background: rgba(255,255,255,0.15); font-size: 14px !important; }
        .leaderboard-item { display: flex; align-items: center; padding: 10px 14px; background: rgba(255,255,255,0.06); border-radius: 8px; margin-bottom: 6px; gap: 12px; }
        .leaderboard-item .rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
        .rank-1 { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .rank-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); }
        .rank-3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .rank-other { background: rgba(255,255,255,0.15); }
        .tts-presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tts-preset-btn { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.25); border-radius: 6px; background: rgba(255,255,255,0.08); color: white; font-size: 12px; cursor: pointer; }
        .tts-preset-btn:active { background: rgba(255,255,255,0.2); }
        .tts-textarea { width: 100%; min-height: 80px; padding: 12px; border: 2px solid rgba(255,255,255,0.25); border-radius: 8px; background: rgba(255,255,255,0.08); color: white; font-size: 14px; resize: vertical; outline: none; font-family: inherit; line-height: 1.6; }
        .tts-textarea:focus { border-color: #2ecc71; }
        .tts-textarea::placeholder { color: rgba(255,255,255,0.4); }
        .game-status { text-align: center; padding: 20px; }
        .game-status .status-icon { font-size: 40px; margin-bottom: 8px; }
        .game-status .status-text { font-size: 16px; opacity: 0.8; }
        .game-round-name { font-size: 20px; font-weight: bold; margin-top: 4px; }
        .demo-link { text-align: center; padding: 12px; font-size: 12px; opacity: 0.6; }
        .demo-link a { color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">GSP® AI 主持控制台</div>
    <div class="subtitle">2026年7月线下学习会</div>
</div>

<div class="status-bar">
    <div class="status-item">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">未连接</span>
    </div>
    <div class="status-item">
        <span>连接数: <strong id="clientCount">0</strong></span>
    </div>
    <div class="status-item">
        <span id="slideIndicator">第 <strong id="currentSlideDisplay">1</strong> 页</span>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" data-tab="remote"><span class="tab-icon">📱</span> 遥控</button>
    <button class="tab-btn" data-tab="scores"><span class="tab-icon">🏆</span> 积分</button>
    <button class="tab-btn" data-tab="tts"><span class="tab-icon">🔊</span> 播报</button>
    <button class="tab-btn" data-tab="game"><span class="tab-icon">🎮</span> 游戏</button>
    <button class="tab-btn" data-tab="ai"><span class="tab-icon">🤖</span> AI</button>
</div>

<!-- Tab 1: 遥控 -->
<div class="tab-content active" id="tab-remote">
    <div class="current-page">
        <div class="page-label">当前页码</div>
        <div class="page-number" id="currentPage">1</div>
        <div class="page-total">/ <span id="totalPages">0</span> 页</div>
    </div>

    <div class="section">
        <div class="control-row">
            <button class="control-btn" onclick="app.first()"><span class="icon">⏮</span> 首页</button>
            <button class="control-btn" onclick="app.prev()"><span class="icon">◀</span> 上一页</button>
            <button class="control-btn" onclick="app.next()"><span class="icon">▶</span> 下一页</button>
            <button class="control-btn" onclick="app.last()"><span class="icon">⏭</span> 末页</button>
        </div>
        <div class="control-row">
            <button class="control-btn secondary" onclick="app.toggleFullscreen()"><span class="icon">⛶</span> 全屏</button>
            <button class="control-btn secondary" onclick="app.replayVideo()"><span class="icon">▶</span> 重播视频</button>
        </div>
    </div>

    <div class="jump-section">
        <div class="section-title">📌 快速跳转</div>
        <div class="jump-input-row">
            <input type="number" class="jump-input" id="jumpInput" placeholder="输入页码" min="1">
            <button class="btn btn-primary" onclick="app.jumpTo()" style="padding: 12px 20px;">跳转</button>
        </div>
        <div class="quick-pages" id="quickPages"></div>
    </div>

    <div class="qr-section">
        <div class="qr-container"><canvas id="qrcode"></canvas></div>
        <div class="qr-hint">扫码在手机上打开控制台</div>
    </div>
</div>

<!-- Tab 2: 积分管理 -->
<div class="tab-content" id="tab-scores">
    <div class="section">
        <div class="section-title">🏆 各组实时积分</div>
        <div id="scoreList"></div>
        <div class="btn-row">
            <button class="btn btn-danger btn-sm" onclick="app.resetAllScores()">🔄 重置所有积分</button>
            <button class="btn btn-secondary btn-sm" onclick="app.requestLeaderboard()">📊 广播排行榜</button>
        </div>
    </div>
    <div class="section">
        <div class="section-title">📊 积分排行榜</div>
        <div id="leaderboardList"><div style="text-align:center; opacity:0.5; padding:20px; font-size:13px;">暂无数据</div></div>
    </div>
</div>

<!-- Tab 3: 语音播报 -->
<div class="tab-content" id="tab-tts">
    <div class="section">
        <div class="section-title">🔊 AI 语音播报</div>
        <div class="card">
            <div style="font-size:13px; opacity:0.7; margin-bottom:8px;">预设播报内容</div>
            <div class="tts-presets">
                <button class="tts-preset-btn" onclick="app.setTtsText('大家好，欢迎参加本次学习会')">欢迎语</button>
                <button class="tts-preset-btn" onclick="app.setTtsText('请各小组做好准备')">小组准备</button>
                <button class="tts-preset-btn" onclick="app.setTtsText('请鼓掌欢迎')">鼓掌</button>
                <button class="tts-preset-btn" onclick="app.setTtsText('时间到，请停止讨论')">时间到</button>
                <button class="tts-preset-btn" onclick="app.setTtsText('感谢大家的积极参与')">感谢参与</button>
                <button class="tts-preset-btn" onclick="app.setTtsText('本次学习会到此结束')">结束语</button>
            </div>
        </div>
        <div class="card">
            <div style="font-size:13px; opacity:0.7; margin-bottom:8px;">自定义播报内容</div>
            <textarea class="tts-textarea" id="ttsText" placeholder="请输入要播报的文字内容...">大家好，欢迎参加本次学习会</textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary btn-lg" onclick="app.speakTts()" style="flex:2;">🔊 立即播报</button>
            <button class="btn btn-secondary btn-lg" onclick="app.stopTts()" style="flex:1;">⏹ 停止</button>
        </div>
    </div>
</div>

<!-- Tab 4: 游戏控制 -->
<div class="tab-content" id="tab-game">
    <div class="section">
        <div class="section-title">🎮 游戏环节控制</div>
        <div class="game-status">
            <div class="status-icon" id="gameStatusIcon">⏹</div>
            <div class="status-text" id="gameStatusText">游戏未开始</div>
            <div class="game-round-name" id="gameRoundName"></div>
        </div>
        <div class="card">
            <div style="font-size:13px; opacity:0.7; margin-bottom:8px;">环节名称</div>
            <div class="input-group">
                <input class="input" id="roundNameInput" placeholder="输入环节名称，如：知识问答" value="知识问答">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="app.startGame()">▶ 开始环节</button>
            <button class="btn btn-warning" onclick="app.endGame()">⏸ 结束环节</button>
            <button class="btn btn-danger" onclick="app.resetGame()">🔄 重置游戏</button>
        </div>
    </div>
    <div class="section">
        <div class="section-title">⚡ 抢答加分（点击队伍加分，自动 TTS 播报）</div>
        <div id="gameTeamGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;"></div>
    </div>
</div>

<!-- Tab 5: AI 语音对话 -->
<div class="tab-content" id="tab-ai">
    <div class="section">
        <div class="section-title">🤖 AI 语音对话</div>
        <div class="card" style="max-height:250px; overflow-y:auto;" id="aiChatHistory">
            <div style="text-align:center; opacity:0.5; padding:20px; font-size:13px;" id="aiChatEmpty">开始与 AI 对话吧！</div>
        </div>
        <div class="card">
            <div style="font-size:13px; opacity:0.7; margin-bottom:8px;">输入问题</div>
            <div class="input-group">
                <input class="input" id="aiQuestionInput" placeholder="输入你想问的问题..." onkeydown="if(event.key==='Enter')app.askAI()">
                <button class="btn btn-primary" onclick="app.askAI()" style="white-space:nowrap;">发送</button>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" id="aiVoiceBtn" onclick="app.toggleVoiceInput()" style="flex:1;">🎤 按住说话</button>
            <button class="btn btn-secondary" onclick="app.clearAIChat()" style="flex:0;">🗑 清空</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="demo-link">演示页面: <a href="/slides.html" target="_blank">点击打开</a></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="/static/js/ws-client.js"></script>
<script src="/static/js/slide-store.js"></script>
<script>
    (function() {
        const app = {
            store: new SlideStore(),
            teamsCache: [],
            gameTeams: ['A队', 'B队', 'C队', 'D队'],
            teamColors: { 'A队': '#e74c3c', 'B队': '#2ecc71', 'C队': '#f39c12', 'D队': '#3498db' },

            init: function() {
                const self = this;

                this.store.onCurrentSlideChange = function(slideId, position, total) {
                    document.getElementById('currentPage').textContent = position;
                    document.getElementById('currentSlideDisplay').textContent = position;
                    document.getElementById('totalPages').textContent = total;
                    document.getElementById('jumpInput').max = total;
                };

                this.store.onConnectionStatusChange = function(status) {
                    const dot = document.getElementById('statusDot');
                    const text = document.getElementById('statusText');
                    dot.classList.toggle('connected', status === 'connected');
                    text.textContent = status === 'connected' ? '已连接' : '未连接';
                };

                this.store.ws.on('clients_count', function(data) {
                    document.getElementById('clientCount').textContent = data.count;
                });

                this.store.ws.on('score_board', function(data) {
                    self.teamsCache = data.teams || [];
                    self.renderScoreBoard(self.teamsCache);
                    self.renderLeaderboard(self.teamsCache);
                    self.renderGameTeamGrid(self.teamsCache);
                });

                this.store.ws.on('score_update', function(data) {
                    self.updateSingleScore(data.team_name, data.score);
                });

                this.store.ws.on('score_set', function(data) {
                    self.updateSingleScore(data.team_name, data.score);
                });

                this.store.ws.on('score_reset', function(data) {
                    self.teamsCache = data.teams || [];
                    self.renderScoreBoard(self.teamsCache);
                    self.renderLeaderboard(self.teamsCache);
                    self.renderGameTeamGrid(self.teamsCache);
                });

                this.store.ws.on('game_control', function(data) {
                    self.handleGameControl(data);
                });

                this.store.ws.on('ai_answer', function(data) {
                    self.handleAIResponse(data);
                });

                this.store.ws.on('ai_voice_status', function(data) {
                    if (data.message) self.showToast(data.message);
                });

                this.store.init().then(function() {
                    self.updateQuickPages();
                    self.requestScores();
                });

                this.bindTabs();
                this.bindKeyboard();
                this.generateQR();
            },

            // ---- 导航 ----
            next: function() { this.store.next(); },
            prev: function() { this.store.prev(); },
            first: function() { this.store.first(); },
            last: function() { this.store.last(); },
            jumpTo: function(page) {
                if (page === undefined) page = document.getElementById('jumpInput').value;
                if (page) {
                    this.store.gotoPosition(parseInt(page));
                    document.getElementById('jumpInput').value = '';
                }
            },
            toggleFullscreen: function() { this.store.toggleFullscreen(); },
            replayVideo: function() { this.store.replayVideo(); },

            updateQuickPages: function() {
                const container = document.getElementById('quickPages');
                const slides = this.store.slides;
                // 按章节生成入口
                const seenChapters = new Set();
                const buttons = [];
                slides.forEach(function(s, idx) {
                    if (s.chapter && !seenChapters.has(s.chapter)) {
                        seenChapters.add(s.chapter);
                        buttons.push('<button class="quick-page-btn" onclick="app.jumpTo(' + (idx + 1) + ')">' + s.chapter + '</button>');
                    }
                });
                container.innerHTML = buttons.join('');
            },

            // ---- 积分 ----
            requestScores: function() { this.store.send({ type: 'score_get' }); },
            requestLeaderboard: function() { this.store.send({ type: 'score_leaderboard' }); },
            updateScore: function(teamName, delta, autoTts) {
                this.store.send({ type: 'score_update', team_name: teamName, delta: delta, auto_tts: autoTts || false });
            },
            updateSingleScore: function(teamName, score) {
                const idx = this.teamsCache.findIndex(function(t) { return t.team_name === teamName; });
                if (idx >= 0) this.teamsCache[idx].score = score;
                this.renderScoreBoard(this.teamsCache);
                this.renderLeaderboard(this.teamsCache);
                this.renderGameTeamGrid(this.teamsCache);
            },
            customScore: function(teamName) {
                const input = prompt('输入 ' + teamName + ' 的加减分数', '0');
                if (input !== null) {
                    const delta = parseInt(input);
                    if (!isNaN(delta)) this.updateScore(teamName, delta, false);
                }
            },
            resetAllScores: function() {
                if (confirm('确认重置所有队伍积分？')) {
                    this.store.send({ type: 'score_reset' });
                    this.showToast('积分已重置');
                }
            },
            renderScoreBoard: function(teams) {
                this.teamsCache = teams || [];
                const container = document.getElementById('scoreList');
                if (!teams || teams.length === 0) {
                    container.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">暂无队伍数据</div>';
                    return;
                }
                const self = this;
                container.innerHTML = teams.map(function(t) {
                    return '<div class="score-team"><div class="name">' + t.team_name + '</div>' +
                        '<div class="score" id="score-' + t.team_name + '">' + t.score + '</div>' +
                        '<div class="score-actions">' +
                        '<button class="btn-score-add" onclick="app.updateScore(\'' + t.team_name + '\', 10, true)" title="加10分">+10</button>' +
                        '<button class="btn-score-add" onclick="app.updateScore(\'' + t.team_name + '\', 5, false)" title="加5分">+5</button>' +
                        '<button class="btn-score-sub" onclick="app.updateScore(\'' + t.team_name + '\', -5, false)" title="减5分">-5</button>' +
                        '<button class="btn-score-sub" onclick="app.updateScore(\'' + t.team_name + '\', -10, false)" title="减10分">-10</button>' +
                        '<button class="btn-score-custom" onclick="app.customScore(\'' + t.team_name + '\')" title="自定义">✏️</button>' +
                        '</div></div>';
                }).join('');
            },
            renderLeaderboard: function(teams) {
                const container = document.getElementById('leaderboardList');
                if (!teams || teams.length === 0) {
                    container.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">暂无数据</div>';
                    return;
                }
                const sorted = teams.slice().sort(function(a, b) { return b.score - a.score; });
                container.innerHTML = sorted.map(function(t, i) {
                    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                    return '<div class="leaderboard-item"><div class="rank ' + rankClass + '">' + (i + 1) + '</div><div style="flex:1; font-weight:bold;">' + t.team_name + '</div><div style="font-size:18px; font-weight:bold;">' + t.score + '</div></div>';
                }).join('');
            },
            renderGameTeamGrid: function(teams) {
                const grid = document.getElementById('gameTeamGrid');
                if (!grid) return;
                const scoreMap = {};
                (teams || []).forEach(function(t) { scoreMap[t.team_name] = t.score; });
                const self = this;
                grid.innerHTML = this.gameTeams.map(function(tname) {
                    const score = scoreMap[tname] || 0;
                    const color = self.teamColors[tname] || '#003366';
                    return '<div style="background:rgba(255,255,255,0.08); border-radius:12px; padding:12px; text-align:center; border:2px solid ' + color + '40;">' +
                        '<div style="font-size:24px; font-weight:bold; color:' + color + '; margin-bottom:4px;">' + tname + '</div>' +
                        '<div style="font-size:36px; font-weight:bold; margin:8px 0; color:white;" id="gameScore-' + tname + '">' + score + '</div>' +
                        '<div style="display:flex; gap:4px; justify-content:center; flex-wrap:wrap;">' +
                        '<button class="btn-score-add" style="width:44px; height:44px; font-size:20px; border-radius:50%; background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 1)" title="加1分">+1</button>' +
                        '<button class="btn-score-add" style="width:44px; height:44px; font-size:20px; border-radius:50%; background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 2)" title="加2分">+2</button>' +
                        '<button class="btn-score-add" style="width:44px; height:44px; font-size:20px; border-radius:50%; background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 5)" title="加5分">+5</button>' +
                        '<button class="btn-score-add" style="width:44px; height:44px; font-size:20px; border-radius:50%; background:' + color + ';" onclick="app.gameScore(\'' + tname + '\', 10)" title="加10分">+10</button>' +
                        '<button class="btn-score-sub" style="width:44px; height:44px; font-size:20px; border-radius:50%;" onclick="app.gameScore(\'' + tname + '\', -1)" title="减1分">-1</button>' +
                        '<button class="btn-score-sub" style="width:44px; height:44px; font-size:20px; border-radius:50%;" onclick="app.gameScore(\'' + tname + '\', -5)" title="减5分">-5</button>' +
                        '</div></div>';
                }).join('');
            },
            gameScore: function(teamName, delta) {
                this.store.send({ type: 'score_update', team_name: teamName, delta: delta, auto_tts: true });
                this.showToast('⚡ ' + teamName + ' ' + (delta > 0 ? '+' : '') + delta);
            },

            // ---- TTS ----
            setTtsText: function(text) { document.getElementById('ttsText').value = text; },
            speakTts: function() {
                const text = document.getElementById('ttsText').value.trim();
                if (!text) { this.showToast('请输入播报内容'); return; }
                this.store.send({ type: 'tts_speak', text: text, voice: '' });
                this.showToast('📢 播报请求已发送');
            },
            stopTts: function() { this.store.send({ type: 'tts_stop' }); this.showToast('⏹ 播报已停止'); },

            // ---- 游戏 ----
            startGame: function() {
                const name = document.getElementById('roundNameInput').value.trim() || '知识问答';
                this.store.send({ type: 'game_control', action: 'start', round_name: name });
                this.showToast('▶ 环节已开始: ' + name);
            },
            endGame: function() { this.store.send({ type: 'game_control', action: 'end' }); this.showToast('⏸ 环节已结束'); },
            resetGame: function() {
                if (confirm('确认重置游戏（将清除所有积分）？')) {
                    this.store.send({ type: 'game_control', action: 'reset' });
                    this.showToast('🔄 游戏已重置');
                }
            },
            handleGameControl: function(data) {
                const icon = document.getElementById('gameStatusIcon');
                const text = document.getElementById('gameStatusText');
                const name = document.getElementById('gameRoundName');
                if (data.action === 'started') {
                    icon.textContent = '▶'; text.textContent = '游戏进行中'; name.textContent = data.round_name || '';
                } else if (data.action === 'ended') {
                    icon.textContent = '⏹'; text.textContent = '游戏已结束'; name.textContent = '';
                } else if (data.action === 'reset') {
                    icon.textContent = '⏹'; text.textContent = '游戏未开始'; name.textContent = '';
                }
            },

            // ---- AI ----
            askAI: function() {
                const input = document.getElementById('aiQuestionInput');
                const text = input.value.trim();
                if (!text) return;
                this.addAIChatMessage('user', text);
                input.value = '';
                this.store.send({ type: 'ai_question', text: text });
                this.addAIChatMessage('ai', '🤔 思考中...', true);
            },
            addAIChatMessage: function(role, text, isTemp) {
                const history = document.getElementById('aiChatHistory');
                const empty = document.getElementById('aiChatEmpty');
                if (empty) empty.style.display = 'none';
                if (isTemp) {
                    const existing = history.querySelector('.ai-message.temp');
                    if (existing) existing.remove();
                }
                const msg = document.createElement('div');
                msg.className = 'ai-message ' + (isTemp ? 'temp' : '');
                const isUser = role === 'user';
                msg.style.cssText = 'display:flex; gap:8px; margin-bottom:10px;' + (isUser ? 'flex-direction:row-reverse;' : '') + 'align-items:flex-start;';
                const avatar = isUser ? '👤' : '🤖';
                const bgColor = isUser ? 'rgba(46,204,113,0.2)' : 'rgba(255,255,255,0.08)';
                msg.innerHTML = '<div style="font-size:20px; flex-shrink:0;">' + avatar + '</div>' +
                    '<div style="background:' + bgColor + '; padding:10px 14px; border-radius:10px; font-size:13px; line-height:1.6; max-width:85%; word-break:break-word;">' + text + '</div>';
                history.appendChild(msg);
                history.scrollTop = history.scrollHeight;
            },
            clearAIChat: function() {
                document.getElementById('aiChatHistory').innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px; font-size:13px;" id="aiChatEmpty">开始与 AI 对话吧！</div>';
            },
            handleAIResponse: function(data) {
                const history = document.getElementById('aiChatHistory');
                const temp = history.querySelector('.ai-message.temp');
                if (temp) temp.remove();
                if (data.text) this.addAIChatMessage('ai', data.text);
            },
            toggleVoiceInput: function() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    this.showToast('⚠ 您的浏览器不支持语音识别，请使用 Chrome'); return;
                }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN'; recognition.continuous = false; recognition.interimResults = false;
                const btn = document.getElementById('aiVoiceBtn');
                const self = this;
                btn.textContent = '🎤 录音中...'; btn.style.background = 'rgba(231,76,60,0.4)';
                recognition.onresult = function(event) {
                    document.getElementById('aiQuestionInput').value = event.results[0][0].transcript;
                    self.askAI(); btn.textContent = '🎤 按住说话'; btn.style.background = '';
                };
                recognition.onerror = function() { self.showToast('⚠ 语音识别失败，请重试'); btn.textContent = '🎤 按住说话'; btn.style.background = ''; };
                recognition.onend = function() { btn.textContent = '🎤 按住说话'; btn.style.background = ''; };
                recognition.start();
            },

            // ---- 通用 ----
            bindTabs: function() {
                document.addEventListener('click', function(e) {
                    const tabBtn = e.target.closest('.tab-btn');
                    if (!tabBtn) return;
                    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                    tabBtn.classList.add('active');
                    document.getElementById('tab-' + tabBtn.dataset.tab).classList.add('active');
                    if (tabBtn.dataset.tab === 'scores') app.requestScores();
                });
            },
            bindKeyboard: function() {
                document.addEventListener('keydown', function(e) {
                    switch(e.key) {
                        case 'ArrowRight': case ' ': e.preventDefault(); app.next(); break;
                        case 'ArrowLeft': e.preventDefault(); app.prev(); break;
                        case 'Home': e.preventDefault(); app.first(); break;
                        case 'End': e.preventDefault(); app.last(); break;
                    }
                });
            },
            generateQR: function() {
                const url = window.location.href;
                const canvas = document.getElementById('qrcode');
                if (typeof QRCode !== 'undefined') {
                    QRCode.toCanvas(canvas, url, { width: 100, margin: 1, color: { dark: '#003366', light: '#ffffff' } }, function(error) {
                        if (error) console.error('二维码生成失败:', error);
                    });
                }
            },
            showToast: function(message) {
                const el = document.getElementById('toast');
                el.textContent = message;
                el.classList.add('show');
                clearTimeout(this.toastTimer);
                this.toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
            }
        };

        window.app = app;
        app.init();
    })();
</script>
</body>
</html>
