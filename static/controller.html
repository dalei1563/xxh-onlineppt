<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GSP 学习会 · 演示控制台</title>
    <style>
        :root {
            --bg-deep: #0b1120;
            --bg-base: #0f172a;
            --bg-elevated: #182238;
            --bg-card: rgba(255, 255, 255, 0.055);
            --bg-active: rgba(34, 197, 94, 0.13);
            --foreground: #f1f5f9;
            --muted: #94a3b8;
            --dim: #64748b;
            --accent: #22c55e;
            --accent-dark: #16a34a;
            --accent-glow: rgba(34, 197, 94, 0.25);
            --border: rgba(255, 255, 255, 0.09);
            --border-hover: rgba(255, 255, 255, 0.16);
            --radius-sm: 9px;
            --radius-md: 13px;
            --radius-lg: 18px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            display: flex;
            flex-direction: column;
            color: var(--foreground);
            background: var(--bg-deep);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        button, input, textarea { font: inherit; }
        button { -webkit-tap-highlight-color: transparent; }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            padding: calc(env(safe-area-inset-top, 0px) + 11px) 15px 11px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .brand-icon {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            flex-shrink: 0;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font-weight: 800;
        }
        .brand-name { font-size: 15px; font-weight: 700; }
        .brand-sub { margin-top: 1px; color: var(--muted); font-size: 11px; }
        .header-status { display: flex; align-items: center; gap: 7px; }
        .status-badge, .page-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 9px;
            border-radius: 999px;
            background: rgba(255,255,255,.06);
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
        .status-dot.connected { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
        .status-dot.connecting { background: #f59e0b; animation: pulse 1s ease infinite; }
        .page-chip strong { color: var(--foreground); font-size: 13px; }
        @keyframes pulse { 50% { opacity: .35; } }

        .content { position: relative; flex: 1; overflow: hidden; }
        .pane {
            position: absolute;
            inset: 0;
            overflow: auto;
            padding: 16px 15px 24px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(6px);
            transition: opacity 180ms ease, transform 180ms ease, visibility 0ms 180ms;
            -webkit-overflow-scrolling: touch;
        }
        .pane.active {
            opacity: 1;
            visibility: visible;
            transform: none;
            transition-delay: 0ms;
        }
        .pane::-webkit-scrollbar { width: 3px; }
        .pane::-webkit-scrollbar-thumb { border-radius: 3px; background: var(--border-hover); }

        .slide-carousel {
            display: grid;
            grid-template-columns: minmax(0, .72fr) minmax(0, 1.4fr) minmax(0, .72fr);
            align-items: center;
            gap: 9px;
            min-height: 150px;
            padding: 4px 0 12px;
        }
        .thumb-card {
            position: relative;
            min-width: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-elevated);
            box-shadow: 0 8px 22px rgba(0,0,0,.2);
        }
        button.thumb-card {
            padding: 0;
            color: inherit;
            cursor: pointer;
            transition: transform var(--transition), opacity var(--transition), border-color var(--transition);
        }
        button.thumb-card:active { transform: scale(.96); }
        .thumb-card.side { opacity: .62; }
        .thumb-card.side:hover { opacity: .9; border-color: var(--border-hover); }
        .thumb-card.current {
            z-index: 1;
            border-color: rgba(34,197,94,.7);
            box-shadow: 0 12px 32px rgba(0,0,0,.32), 0 0 0 1px rgba(34,197,94,.16);
        }
        .thumb-card img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #111827;
        }
        .thumb-card.side img { filter: brightness(.82); }
        /* 保留三列网格占位，但彻底隐藏边界页不存在的侧卡片。
           opacity 可规避部分浏览器在复用 img 后残留破图图标的问题。 */
        .thumb-card.is-empty {
            visibility: visible;
            opacity: 0 !important;
            pointer-events: none;
            transition: none;
        }
        .thumb-caption {
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            overflow: hidden;
            padding: 12px 8px 6px;
            background: linear-gradient(transparent, rgba(3,7,18,.88));
            color: rgba(255,255,255,.82);
            font-size: 9px;
            font-weight: 650;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .thumb-current-info {
            padding: 7px 9px 8px;
            background: rgba(15,23,42,.96);
            text-align: center;
        }
        .thumb-current-title {
            overflow: hidden;
            font-size: 12px;
            font-weight: 700;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .thumb-current-meta {
            overflow: hidden;
            margin-top: 2px;
            color: var(--muted);
            font-size: 9px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .primary-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .primary-nav button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-height: 72px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: var(--radius-lg);
            background: var(--bg-elevated);
            color: var(--foreground);
            cursor: pointer;
            font-size: 17px;
            font-weight: 750;
            transition: transform var(--transition), background var(--transition), opacity var(--transition);
        }
        .primary-nav button:last-child {
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            box-shadow: 0 7px 22px var(--accent-glow);
            color: #fff;
        }
        .primary-nav button:active { transform: scale(.97); }
        .primary-nav button:disabled { cursor: default; opacity: .36; box-shadow: none; }
        .primary-nav svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2.2; }

        .utility-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 7px;
            margin-bottom: 13px;
        }
        .utility-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 56px;
            padding: 7px 3px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            color: var(--muted);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: var(--transition);
        }
        .utility-btn:active { transform: scale(.95); background: rgba(255,255,255,.1); }
        .utility-btn:disabled { opacity: .35; }
        .utility-btn.active { border-color: var(--accent); background: var(--bg-active); color: var(--accent); }
        .utility-btn svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 1.9; }

        .card {
            margin-bottom: 12px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-card);
        }
        .card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 11px; }
        .card-title { font-size: 13px; font-weight: 700; }
        .card-hint { color: var(--dim); font-size: 10px; }

        .chapter-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .chapter-btn {
            max-width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255,255,255,.035);
            color: var(--foreground);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
        }
        .chapter-btn:active { transform: scale(.97); }
        .chapter-btn.active { border-color: var(--accent); background: var(--bg-active); }
        .chapter-name {
            display: block;
            overflow: hidden;
            font-size: 11px;
            font-weight: 650;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chapter-btn.active .chapter-name { color: var(--accent); }
        .empty-chapters { grid-column: 1 / -1; padding: 13px; color: var(--dim); font-size: 12px; text-align: center; }
        .input, .textarea {
            width: 100%;
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            outline: none;
            background: rgba(255,255,255,.04);
            color: var(--foreground);
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input { min-height: 42px; padding: 9px 12px; font-size: 14px; font-weight: 700; }
        .textarea { min-height: 96px; padding: 11px 12px; resize: vertical; font-size: 14px; line-height: 1.55; }
        .input:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input::placeholder, .textarea::placeholder { color: var(--dim); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 42px;
            padding: 9px 17px;
            border: 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: var(--transition);
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
        .btn-secondary { border: 1px solid var(--border); background: rgba(255,255,255,.08); color: var(--foreground); }
        .btn-row { display: flex; gap: 8px; }
        .btn-row .btn { flex: 1; }

        .section-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 15px; font-weight: 700; }
        .section-title svg { width: 19px; height: 19px; fill: none; stroke: var(--accent); stroke-width: 2; }
        .presets { display: flex; flex-wrap: wrap; gap: 7px; }
        .preset {
            padding: 7px 11px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255,255,255,.04);
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
        }
        .preset:active { border-color: var(--accent); background: var(--accent); color: #fff; }

        .tab-bar {
            display: flex;
            flex-shrink: 0;
            padding-bottom: var(--safe-bottom);
            border-top: 1px solid var(--border);
            background: var(--bg-base);
        }
        .tab-item {
            position: relative;
            display: flex;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 55px;
            border: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-item::before {
            position: absolute;
            top: 0;
            left: 34%;
            right: 34%;
            height: 2px;
            border-radius: 0 0 2px 2px;
            background: var(--accent);
            content: "";
            opacity: 0;
        }
        .tab-item.active { color: var(--accent); }
        .tab-item.active::before { opacity: 1; }
        .tab-item svg { width: 21px; height: 21px; fill: none; stroke: currentColor; stroke-width: 1.9; }

        .footer-link {
            flex-shrink: 0;
            padding: 7px;
            border-top: 1px solid var(--border);
            background: var(--bg-base);
            text-align: center;
        }
        .footer-link a { color: var(--muted); font-size: 10px; text-decoration: none; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 100;
            max-width: calc(100% - 40px);
            padding: 12px 21px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            background: rgba(0,0,0,.88);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            transform: translate(-50%, -50%) scale(.92);
            transition: 220ms ease;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        @media (min-width: 768px) {
            body { max-width: 520px; margin: 0 auto; border-right: 1px solid var(--border); border-left: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <div class="brand-icon">G</div>
            <div>
                <div class="brand-name">GSP 控制台</div>
                <div class="brand-sub">在线演示控制系统</div>
            </div>
        </div>
        <div class="header-status">
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <div class="page-chip">第 <strong id="currentSlideDisplay">1</strong> 页</div>
        </div>
    </header>

    <main class="content">
        <section class="pane active" id="pane-remote">
            <div class="slide-carousel" aria-label="当前幻灯片及前后页面">
                <button class="thumb-card side is-empty" id="carouselPrev" type="button" onclick="app.prev()" aria-label="上一张幻灯片">
                    <img id="carouselPrevImage" alt="">
                    <span class="thumb-caption" id="carouselPrevCaption"></span>
                </button>
                <div class="thumb-card current" id="carouselCurrent">
                    <img id="carouselCurrentImage" alt="当前幻灯片缩略图">
                    <div class="thumb-current-info">
                        <div class="thumb-current-title" id="carouselCurrentTitle">正在加载…</div>
                        <div class="thumb-current-meta" id="carouselCurrentMeta"></div>
                    </div>
                </div>
                <button class="thumb-card side is-empty" id="carouselNext" type="button" onclick="app.next()" aria-label="下一张幻灯片">
                    <img id="carouselNextImage" alt="">
                    <span class="thumb-caption" id="carouselNextCaption"></span>
                </button>
            </div>

            <div class="primary-nav" aria-label="主要翻页控制">
                <button id="prevBtn" onclick="app.prev()">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    <span>上一页</span>
                </button>
                <button id="nextBtn" onclick="app.next()">
                    <span>下一页</span>
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>

            <div class="utility-nav" aria-label="辅助演示控制">
                <button class="utility-btn" id="firstBtn" onclick="app.first()">
                    <svg viewBox="0 0 24 24"><polyline points="19 18 13 12 19 6"/><line x1="6" y1="5" x2="6" y2="19"/></svg>
                    <span>首页</span>
                </button>
                <button class="utility-btn" onclick="app.toggleFullscreen()">
                    <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    <span>全屏</span>
                </button>
                <button class="utility-btn" onclick="app.replayVideo()">
                    <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 0 2.34-5.66L4 8.68"/><polyline points="4 3 4 9 10 9"/><polygon points="10 8 17 12 10 16 10 8"/></svg>
                    <span>重播</span>
                </button>
                <button class="utility-btn" id="displayModeBtn" onclick="app.toggleDisplayMode()">
                    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    <span id="displayModeLabel">撑满</span>
                </button>
                <button class="utility-btn" id="lastBtn" onclick="app.last()">
                    <svg viewBox="0 0 24 24"><polyline points="5 6 11 12 5 18"/><line x1="18" y1="5" x2="18" y2="19"/></svg>
                    <span>末页</span>
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">章节跳转</div>
                </div>
                <div class="chapter-list" id="chapterList">
                    <div class="empty-chapters">正在加载章节…</div>
                </div>
            </div>
        </section>

        <section class="pane" id="pane-tts">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                <span>语音播报</span>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">快捷内容</div></div>
                <div class="presets">
                    <button class="preset" onclick="app.setTtsText('大家好，欢迎参加本次学习会')">👋 欢迎语</button>
                    <button class="preset" onclick="app.setTtsText('请各小组做好准备')">🎯 小组准备</button>
                    <button class="preset" onclick="app.setTtsText('请鼓掌欢迎')">👏 鼓掌</button>
                    <button class="preset" onclick="app.setTtsText('时间到，请停止讨论')">⏰ 时间到</button>
                    <button class="preset" onclick="app.setTtsText('感谢大家的积极参与')">🙏 感谢参与</button>
                    <button class="preset" onclick="app.setTtsText('本次学习会到此结束')">🎬 结束语</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">自定义播报</div></div>
                <textarea class="textarea" id="ttsText" placeholder="输入要播报的文字内容…">大家好，欢迎参加本次学习会</textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="app.speakTts()">立即播报</button>
                <button class="btn btn-secondary" onclick="app.stopTts()">停止播报</button>
            </div>
        </section>
    </main>

    <nav class="tab-bar" aria-label="控制台功能">
        <button class="tab-item active" data-tab="remote">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span>遥控</span>
        </button>
        <button class="tab-item" data-tab="tts">
            <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <span>播报</span>
        </button>
    </nav>
    <div class="footer-link"><a href="/slides.html" target="_blank">打开演示页面 ↗</a></div>
    <div class="toast" id="toast"></div>

    <script src="/static/js/ws-client.js"></script>
    <script src="/static/js/slide-store.js"></script>
    <script>
        (function() {
            const app = {
                store: new SlideStore(),
                displayMode: 'fill',

                init: function() {
                    const self = this;
                    this.store.onSlidesChange = function() {
                        self.renderChapters();
                        self.renderCarousel();
                    };
                    this.store.onCurrentSlideChange = function(slideId, position, total) {
                        self.renderPosition(position, total);
                        self.renderCarousel();
                        self.updateActiveChapter();
                    };
                    this.store.onConnectionStatusChange = function(status) {
                        const dot = document.getElementById('statusDot');
                        dot.className = 'status-dot' + (status === 'connected' ? ' connected' : status === 'connecting' ? ' connecting' : '');
                        document.getElementById('statusText').textContent =
                            status === 'connected' ? '已连接' : status === 'connecting' ? '连接中' : '未连接';
                    };
                    this.bindTabs();
                    this.bindKeyboard();
                    this.store.init();
                },

                renderPosition: function(position, total) {
                    const safePosition = position > 0 ? position : 1;
                    document.getElementById('currentSlideDisplay').textContent = safePosition;
                    document.getElementById('prevBtn').disabled = total === 0 || safePosition <= 1;
                    document.getElementById('firstBtn').disabled = total === 0 || safePosition <= 1;
                    document.getElementById('nextBtn').disabled = total === 0 || safePosition >= total;
                    document.getElementById('lastBtn').disabled = total === 0 || safePosition >= total;
                },

                setCarouselSide: function(side, slide, position) {
                    const card = document.getElementById('carousel' + side);
                    const image = document.getElementById('carousel' + side + 'Image');
                    const caption = document.getElementById('carousel' + side + 'Caption');
                    if (!slide) {
                        delete image.dataset.slideId;
                        image.onload = null;
                        image.onerror = null;
                        image.alt = '';
                        image.style.visibility = 'hidden';
                        image.removeAttribute('src');
                        card.disabled = true;
                        card.setAttribute('aria-hidden', 'true');
                        card.classList.add('is-empty');
                        caption.textContent = '';
                        return;
                    }
                    const slideId = String(slide.slide_id);
                    card.classList.remove('is-empty');
                    card.disabled = false;
                    card.removeAttribute('aria-hidden');
                    image.dataset.slideId = slideId;
                    image.style.visibility = 'hidden';
                    image.alt = slide.title || ('第 ' + position + ' 页');
                    image.onload = function() {
                        if (image.dataset.slideId === slideId) image.style.visibility = 'visible';
                    };
                    image.onerror = function() {
                        if (image.dataset.slideId === slideId) image.style.visibility = 'hidden';
                    };
                    image.src = '/api/slides/' + encodeURIComponent(slideId) + '/thumbnail';
                    caption.textContent = '第 ' + position + ' 页';
                    card.setAttribute(
                        'aria-label',
                        (side === 'Prev' ? '上一张：' : '下一张：') +
                        (slide.title || ('第 ' + position + ' 页'))
                    );
                },

                renderCarousel: function() {
                    const slide = this.store.getCurrentSlide();
                    if (!slide) {
                        document.getElementById('carouselCurrentTitle').textContent =
                            this.store.total ? '正在同步演示状态…' : '暂无幻灯片';
                        document.getElementById('carouselCurrentMeta').textContent = '';
                        this.setCarouselSide('Prev', null, 0);
                        this.setCarouselSide('Next', null, 0);
                        return;
                    }
                    const index = this.store.slideOrder.indexOf(slide.slide_id);
                    const position = index + 1;
                    const previous = index > 0 ? this.store.getSlideByPosition(position - 1) : null;
                    const next = index >= 0 && index < this.store.total - 1
                        ? this.store.getSlideByPosition(position + 1)
                        : null;
                    const image = document.getElementById('carouselCurrentImage');
                    const chapter = slide.chapter || '未分章节';
                    const slideId = String(slide.slide_id);
                    image.dataset.slideId = slideId;
                    image.style.visibility = 'hidden';
                    image.alt = slide.title || '当前幻灯片';
                    image.onload = function() {
                        if (image.dataset.slideId === slideId) image.style.visibility = 'visible';
                    };
                    image.onerror = function() {
                        if (image.dataset.slideId === slideId) image.style.visibility = 'hidden';
                    };
                    image.src = '/api/slides/' + encodeURIComponent(slideId) + '/thumbnail';
                    document.getElementById('carouselCurrentTitle').textContent =
                        slide.title || '未命名幻灯片';
                    document.getElementById('carouselCurrentMeta').textContent =
                        chapter + ' · 第 ' + position + ' / ' + this.store.total + ' 页';
                    this.setCarouselSide('Prev', previous, position - 1);
                    this.setCarouselSide('Next', next, position + 1);
                },

                getChapters: function() {
                    const chapters = [];
                    const indexByName = Object.create(null);
                    const slideMap = Object.create(null);
                    this.store.slides.forEach(function(slide) { slideMap[slide.slide_id] = slide; });
                    this.store.slideOrder.forEach(function(slideId, position) {
                        const slide = slideMap[slideId];
                        if (!slide) return;
                        const name = slide.chapter || '未分章节';
                        let chapter = indexByName[name];
                        if (!chapter) {
                            chapter = {
                                name: name,
                                firstSlideId: slide.slide_id
                            };
                            indexByName[name] = chapter;
                            chapters.push(chapter);
                        }
                    });
                    return chapters;
                },

                renderChapters: function() {
                    const container = document.getElementById('chapterList');
                    const chapters = this.getChapters();
                    container.innerHTML = '';
                    if (!chapters.length) {
                        container.innerHTML = '<div class="empty-chapters">暂无章节</div>';
                        return;
                    }
                    const self = this;
                    chapters.forEach(function(chapter) {
                        const button = document.createElement('button');
                        button.type = 'button';
                        button.className = 'chapter-btn';
                        button.dataset.chapter = chapter.name;
                        button.dataset.slideId = chapter.firstSlideId;
                        const name = document.createElement('span');
                        name.className = 'chapter-name';
                        name.textContent = chapter.name;
                        button.appendChild(name);
                        button.addEventListener('click', function() {
                            self.jumpToSlide(chapter.firstSlideId);
                        });
                        container.appendChild(button);
                    });
                    this.updateActiveChapter();
                },

                updateActiveChapter: function() {
                    const slide = this.store.getCurrentSlide();
                    const activeChapter = slide ? (slide.chapter || '未分章节') : '';
                    document.querySelectorAll('.chapter-btn').forEach(function(button) {
                        button.classList.toggle('active', button.dataset.chapter === activeChapter);
                    });
                },

                next: function() { this.store.next(); },
                prev: function() { this.store.prev(); },
                first: function() { this.store.first(); },
                last: function() { this.store.last(); },
                jumpToSlide: function(slideId) { if (slideId) this.store.goto(slideId); },
                toggleFullscreen: function() { this.store.toggleFullscreen(); },
                replayVideo: function() { this.store.replayVideo(); },
                toggleDisplayMode: function() {
                    this.displayMode = this.displayMode === 'fill' ? '16-9' : 'fill';
                    this.store.send({ type: 'display_mode', mode: this.displayMode });
                    const active = this.displayMode === '16-9';
                    document.getElementById('displayModeBtn').classList.toggle('active', active);
                    document.getElementById('displayModeLabel').textContent = active ? '16:9' : '撑满';
                    this.showToast(active ? '已切换为 16:9' : '已切换为撑满模式');
                },

                setTtsText: function(text) { document.getElementById('ttsText').value = text; },
                speakTts: function() {
                    const text = document.getElementById('ttsText').value.trim();
                    if (!text) {
                        this.showToast('请输入播报内容');
                        return;
                    }
                    this.store.send({ type: 'tts_speak', text: text, voice: '' });
                    this.showToast('播报请求已发送');
                },
                stopTts: function() {
                    this.store.send({ type: 'tts_stop' });
                    this.showToast('播报已停止');
                },

                bindTabs: function() {
                    document.querySelectorAll('.tab-item').forEach(function(item) {
                        item.addEventListener('click', function() {
                            document.querySelectorAll('.tab-item').forEach(function(tab) { tab.classList.remove('active'); });
                            document.querySelectorAll('.pane').forEach(function(pane) { pane.classList.remove('active'); });
                            item.classList.add('active');
                            document.getElementById('pane-' + item.dataset.tab).classList.add('active');
                        });
                    });
                },
                bindKeyboard: function() {
                    document.addEventListener('keydown', function(event) {
                        if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
                        if (event.key === 'ArrowRight' || event.key === ' ') {
                            event.preventDefault();
                            app.next();
                        } else if (event.key === 'ArrowLeft') {
                            event.preventDefault();
                            app.prev();
                        } else if (event.key === 'Home') {
                            event.preventDefault();
                            app.first();
                        } else if (event.key === 'End') {
                            event.preventDefault();
                            app.last();
                        }
                    });
                },
                showToast: function(message) {
                    const toast = document.getElementById('toast');
                    toast.textContent = message;
                    toast.classList.add('show');
                    clearTimeout(this.toastTimer);
                    this.toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
                }
            };

            window.app = app;
            app.init();
        })();
    </script>
</body>
</html>
