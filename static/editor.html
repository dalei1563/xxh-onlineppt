<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP 学习会 · 幻灯片编辑器</title>
    <script src="/static/sortable.min.js"></script>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg-body: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-elevated: #f8fafc;
            --bg-hover: #f1f5f9;
            --bg-active: #f0fdf4;
            --bg-card: #ffffff;
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #22c55e;
            --accent-hover: #16a34a;
            --accent-light: #f0fdf4;
            --accent-border: #bbf7d0;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --danger-border: #fecaca;
            --warning: #f59e0b;
            --foreground: #0f172a;
            --foreground-secondary: #475569;
            --foreground-muted: #94a3b8;
            --foreground-dim: #cbd5e1;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 56px;
            --toolbar-height: 56px;
        }

        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--foreground);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Header ===== */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--header-height);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header .brand-icon {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; color: #fff;
        }
        .app-header .brand-text {
            line-height: 1.2;
        }
        .app-header .brand-name {
            font-size: 15px; font-weight: 700; color: var(--foreground);
        }
        .app-header .brand-sub {
            font-size: 11px; color: var(--foreground-muted); font-weight: 500;
        }
        .app-header .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .app-header .header-actions a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: var(--foreground-secondary);
            transition: all var(--transition);
        }
        .app-header .header-actions a:hover {
            background: var(--bg-hover);
            color: var(--foreground);
        }
        .app-header .header-actions a svg {
            width: 16px; height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== Toolbar ===== */
        .toolbar {
            position: sticky;
            top: var(--header-height);
            z-index: 99;
            height: var(--toolbar-height);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            gap: 12px;
        }
        .toolbar .stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--foreground-secondary);
        }
        .toolbar .stats strong {
            color: var(--foreground);
            font-weight: 700;
        }
        .toolbar .stats .divider {
            width: 1px; height: 20px;
            background: var(--border);
        }
        .toolbar .stats .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .toolbar .stats .status-indicator .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--foreground-dim);
            transition: background var(--transition);
        }
        .toolbar .stats .status-indicator .dot.connected {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
        }
        .toolbar .stats .status-indicator .dot.disconnected {
            background: var(--danger);
        }
        .toolbar .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            min-height: 36px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3); }
        .btn-primary:disabled { background: var(--foreground-dim); cursor: not-allowed; box-shadow: none; }
        .btn-secondary {
            background: var(--bg-body);
            color: var(--foreground-secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-hover); }
        .btn-outline-accent {
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
        }
        .btn-outline-accent:hover { background: var(--accent-light); }
        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
            border: 1px solid var(--danger-border);
        }
        .btn-danger:hover { background: #fee2e2; }
        .btn-sm { padding: 5px 10px; font-size: 12px; min-height: 30px; border-radius: 4px; }
        .btn-ghost {
            background: transparent;
            color: var(--foreground-muted);
            padding: 6px 10px;
        }
        .btn-ghost:hover { background: var(--bg-hover); color: var(--foreground); }
        .btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
        .btn-primary svg { stroke: #fff; }

        /* ===== Editor Body ===== */
        .editor-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 60px;
        }

        /* ===== Chapter Section (group container for divider + cards) ===== */
        .chapter-section {
            margin-bottom: 12px;
        }
        .chapter-section:first-child {
            margin-top: 0;
        }

        .chapter-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 2px 0 10px;
            position: relative;
        }
        .chapter-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
        }
        .chapter-divider {
            cursor: pointer;
        }
        .chapter-drag-handle {
            display: flex;
            align-items: center;
            color: var(--foreground-dim);
            cursor: grab;
            flex-shrink: 0;
            padding: 4px 2px;
        }
        .chapter-drag-handle:active { cursor: grabbing; }
        .chapter-drag-handle svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .chapter-section.sortable-ghost .chapter-divider {
            opacity: 0.45;
        }
        .chapter-section.sortable-chosen .chapter-divider {
            color: var(--accent);
        }
        .chapter-divider.selected .label {
            color: var(--accent);
        }
        .chapter-divider.selected::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
        }
        .chapter-divider .label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--foreground-secondary);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }
        .chapter-divider .label .count {
            font-size: 13px;
            font-weight: 600;
            color: var(--foreground-muted);
            background: var(--bg-body);
            padding: 0 10px;
            border-radius: 10px;
            line-height: 22px;
        }
        .chapter-divider .divider-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
            flex-shrink: 0;
        }
        .chapter-divider:hover .divider-actions {
            opacity: 1;
        }
        .chapter-divider .divider-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--foreground-muted);
            transition: all var(--transition);
        }
        .chapter-divider .divider-btn:hover {
            background: var(--bg-hover);
            color: var(--foreground);
        }
        .chapter-divider .divider-btn.danger:hover {
            background: var(--danger-light);
            color: var(--danger);
        }
        .chapter-divider .divider-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .chapter-divider .label .chapter-name-input {
            font: inherit;
            font-size: inherit;
            font-weight: inherit;
            color: inherit;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent);
            outline: none;
            padding: 0 4px;
            min-width: 60px;
            width: auto;
        }

        /* ===== Slide Grid (per chapter, connected via Sortable group) ===== */
        .slide-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 60px;
        }

        /* ===== Slide Card ===== */
        .slide-card {
            width: 210px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            cursor: grab;
            transition: all var(--transition);
            position: relative;
            user-select: none;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .slide-card:active { cursor: grabbing; }
        .slide-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.15);
            transform: translateY(-1px);
        }
        .slide-card.sortable-ghost {
            border-color: var(--accent);
            background: var(--accent-light);
            opacity: 0.6;
            box-shadow: 0 0 0 3px var(--accent-border);
        }
        .slide-card.sortable-chosen {
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.2);
            transform: scale(1.02);
        }

        .slide-card .card-preview {
            width: 100%;
            height: 118px;
            background: #f0f2f5;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--border);
            cursor: zoom-in;
        }
        .slide-card .card-preview .preview-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        .slide-card .card-preview .preview-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: var(--foreground-dim); font-size: 12px;
        }
        .slide-card .card-preview .preview-open-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.56);
            opacity: 0;
            transition: opacity var(--transition);
        }
        .slide-card .card-preview:hover .preview-open-label,
        .slide-card .card-preview:focus .preview-open-label { opacity: 1; }
        .preview-open-label svg {
            width: 18px; height: 18px;
            stroke: currentColor; stroke-width: 2; fill: none;
        }

        .slide-card .card-footer {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-surface);
        }
        .slide-card .card-footer .drag-handle {
            color: var(--foreground-dim);
            cursor: grab;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .slide-card .card-footer .drag-handle svg {
            width: 14px; height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .slide-card .card-footer .card-title {
            flex: 1;
            min-width: 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--foreground);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slide-card .card-footer .card-type {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            padding: 1px 7px;
            border-radius: 4px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
            line-height: 18px;
        }
        .slide-card .card-footer .btn-delete {
            width: 24px; height: 24px;
            border: none;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--foreground-dim);
            transition: all var(--transition);
            opacity: 0;
            flex-shrink: 0;
        }
        .slide-card:hover .card-footer .btn-delete { opacity: 1; }
        .slide-card .card-footer .btn-delete:hover {
            background: var(--danger-light);
            color: var(--danger);
        }
        .slide-card .card-footer .btn-delete svg {
            width: 14px; height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== File Upload ===== */
        input[type="file"] { display: none; }
        .upload-hint {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }
        .upload-hint.error { color: var(--danger); }

        /* ===== Single-slide Preview Modal ===== */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background: rgba(2, 6, 23, 0.82);
            backdrop-filter: blur(8px);
        }
        .preview-modal.open { display: flex; }
        .preview-dialog {
            width: min(1200px, 94vw);
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        }
        .preview-dialog-header {
            height: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 0 18px;
            color: #e2e8f0;
            background: #111827;
        }
        .preview-dialog-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 700;
        }
        .preview-close {
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 6px;
            color: #cbd5e1;
            background: transparent;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
        }
        .preview-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .preview-frame-wrap {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .preview-frame-wrap iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
        }

        /* ===== Save Hint ===== */
        .save-hint {
            font-size: 12px;
            font-weight: 600;
            transition: all var(--transition);
        }
        .save-hint.unsaved {
            color: var(--danger);
        }
        .save-hint.saved {
            color: var(--accent);
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--foreground);
            color: #fff;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast.success { border-left: 3px solid var(--accent); }
        .toast.error { border-left: 3px solid var(--danger); }

        /* ===== Empty State ===== */
        .editor-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--foreground-muted);
        }
        .editor-empty svg {
            width: 48px; height: 48px;
            stroke: var(--foreground-dim);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 16px;
        }
        .editor-empty h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--foreground-secondary);
            margin-bottom: 8px;
        }
        .editor-empty p {
            font-size: 14px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .app-header { padding: 0 16px; }
            .toolbar { padding: 0 16px; flex-wrap: wrap; height: auto; min-height: var(--toolbar-height); padding-top: 8px; padding-bottom: 8px; }
            .toolbar .stats { font-size: 12px; gap: 10px; flex-wrap: wrap; }
            .editor-body { padding: 16px; }
            .slide-card { width: calc(50% - 6px); }
            .slide-card .card-preview { height: 100px; }
            .slide-card .card-preview > .slide { transform: scale(0.09) !important; }
            .header-actions a span { display: none; }
        }
        @media (max-width: 480px) {
            .slide-card { width: 100%; }
            .slide-card .card-preview { height: 140px; }
            .slide-card .card-preview > .slide { transform: scale(0.12) !important; }
            .toolbar .stats .divider { display: none; }
            .preview-modal { padding: 8px; }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--foreground-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--foreground-muted); }
    </style>
</head>
<body>

    <!-- ===== Header ===== -->
    <header class="app-header">
        <div class="brand">
            <div class="brand-icon">G</div>
            <div class="brand-text">
                <div class="brand-name">幻灯片编辑器</div>
                <div class="brand-sub">GSP 学习会 · 拖拽排序 · 上传媒体</div>
            </div>
        </div>
        <div class="header-actions">
            <a href="/slides.html" target="_blank">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>演示页</span>
            </a>
            <a href="/controller.html" target="_blank">
                <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>控制台</span>
            </a>
        </div>
    </header>

    <!-- ===== Toolbar ===== -->
    <div class="toolbar">
        <div class="stats">
            <span>共 <strong id="totalSlides">0</strong> 页</span>
            <span class="divider"></span>
            <span><strong id="chapterCount">0</strong> 个章节</span>
            <span class="divider"></span>
            <span class="status-indicator">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">连接中</span>
            </span>
            <span class="divider"></span>
            <span class="save-hint" id="saveHint">✅ 已是最新顺序</span>
            <span class="upload-hint" id="uploadHint" aria-live="polite"></span>
        </div>
        <div class="toolbar-actions">
            <button class="btn btn-sm btn-secondary" id="imageUploadButton" onclick="triggerUpload('image')">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                插入图片
            </button>
            <button class="btn btn-sm btn-secondary" id="videoUploadButton" onclick="triggerUpload('video')">
                <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                插入视频
            </button>
            <button class="btn btn-sm btn-secondary" onclick="createExternalSlide()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18"/><path d="M12 3a15 15 0 0 0 0 18"/></svg>
                插入外部页面
            </button>
            <button class="btn btn-sm btn-outline-accent" onclick="createChapter()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建章节
            </button>
        </div>
    </div>

    <!-- ===== Editor Body ===== -->
    <div class="editor-body" id="editorBody">
        <div class="editor-empty">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <h3>正在加载幻灯片数据...</h3>
            <p>请稍候</p>
        </div>
    </div>

    <!-- File Upload Inputs -->
    <input type="file" id="imageInput" accept="image/*" onchange="handleFileUpload(this, 'image')">
    <input type="file" id="videoInput" accept="video/*" onchange="handleFileUpload(this, 'video')">

    <!-- 仅在用户点击缩略图时创建完整幻灯片渲染 -->
    <div class="preview-modal" id="previewModal" aria-hidden="true">
        <div class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="previewDialogTitle">
            <div class="preview-dialog-header">
                <div class="preview-dialog-title" id="previewDialogTitle">幻灯片预览</div>
                <button class="preview-close" id="previewCloseButton" type="button" title="关闭预览" aria-label="关闭预览">×</button>
            </div>
            <div class="preview-frame-wrap" id="previewFrameWrap"></div>
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== Scripts ===== -->
    <script src="/static/js/ws-client.js"></script>
    <script src="/static/js/slide-store.js"></script>
    <script>
        (function() {
            var slidesData = [];
            var sortableInstances = [];
            var chapterSortableInstance = null;
            var selectedChapter = '';

            var TYPE_LABELS = {
                'video': '🎬 视频', 'image': '🖼️ 图片', 'external': '🌐 外部页面', 'white': '📄 HTML',
            };

            var store = new SlideStore();

            // 通过 onSlidesChange + 具体事件处理器保持 slidesData 同步

            store.onSlideCreated = function() {
                showToast('新幻灯片已创建并同步', 'success');
                // slidesData 和渲染由紧随其后的 onSlidesChange 处理
            };

            store.onSlideUpdated = function(slide) {
                // 更新单个卡片，不用全量渲染
                var card = document.querySelector('.slide-card[data-slide-id="' + slide.slide_id + '"]');
                if (card) {
                    var titleEl = card.querySelector('.card-title');
                    if (titleEl) titleEl.textContent = slide.title || '未命名';
                }
            };

            store.onSlideDeleted = function() {
                // slidesData 和渲染由紧随其后的 onSlidesChange 处理
            };

            store.onSlidesReordered = null;

            store.onSlidesChange = function(slides) {
                slidesData = slides;
            };

            store.onConnectionStatusChange = function(status) {
                var dot = document.getElementById('statusDot');
                var text = document.getElementById('statusText');
                if (status === 'connected') {
                    dot.className = 'dot connected';
                    text.textContent = '已连接';
                } else {
                    dot.className = 'dot disconnected';
                    text.textContent = '未连接';
                }
            };

            async function refreshSlidesFromApi() {
                // 从 API 重新拉取幻灯片列表，确保 order 与数据库一致
                try {
                    var res = await fetch('/api/slides?_t=' + Date.now());
                    var slides = await res.json();
                    store.slides = slides || [];
                    store.slideOrder = slides.map(function(s) { return s.slide_id; });
                    store.total = store.slideOrder.length;
                    slidesData = store.slides;
                    return slides;
                } catch (e) {
                    console.warn('Failed to refresh slides from API:', e);
                    return null;
                }
            }

            function init() {
                console.log('[Editor] Initializing...');
                store.init().then(function() {
                    slidesData = store.slides;
                    renderEditor();
                    // 默认选中第一个有内容的章节
                    if (slidesData.length > 0) {
                        selectedChapter = slidesData[0].chapter || '未分类';
                        var firstDiv = document.querySelector('.chapter-divider');
                        if (firstDiv) {
                            firstDiv.classList.add('selected');
                        }
                    }
                    console.log('[Editor] Initial slideOrder:', JSON.stringify(store.slideOrder));
                    // 编辑器只走 REST API，不受 WS 幻灯片变更消息的回环干扰
                    store.ws.handlers['slides_reordered'] = [];
                    store.ws.handlers['slide_created'] = [];
                    store.ws.handlers['slide_updated'] = [];
                    store.ws.handlers['slide_deleted'] = [];
                });
            }

            function selectChapter(ch) {
                selectedChapter = ch;
                document.querySelectorAll('.chapter-divider').forEach(function(d) {
                    d.classList.toggle('selected', d.dataset.chapter === ch);
                });
            }

            function renderEditor() {
                var chapters = [];
                var chapterMap = {};
                slidesData.forEach(function(slide) {
                    var ch = slide.chapter || '未分类';
                    if (!chapterMap[ch]) {
                        chapterMap[ch] = [];
                        chapters.push(ch);
                    }
                    chapterMap[ch].push(slide);
                });

                document.getElementById('totalSlides').textContent = slidesData.length;
                document.getElementById('chapterCount').textContent = chapters.length;

                var container = document.getElementById('editorBody');
                container.innerHTML = '';

                if (chapters.length === 0) {
                    container.innerHTML = '<div class="editor-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><h3>暂无幻灯片</h3><p>请在演示页中添加内容</p></div>';
                    return;
                }

                chapters.forEach(function(ch, idx) {
                    var slides = chapterMap[ch];

                    // Chapter section container
                    var section = document.createElement('div');
                    section.className = 'chapter-section';

                    // Divider with chapter name (always show, even for first)
                    var divider = document.createElement('div');
                    divider.className = 'chapter-divider' + (ch === selectedChapter ? ' selected' : '');
                    divider.dataset.chapter = ch;
                    divider.onclick = function() { selectChapter(ch); };
                    divider.innerHTML =
                        '<span class="chapter-drag-handle" title="拖拽调整章节顺序"><svg viewBox="0 0 24 24"><circle cx="9" cy="5" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="19" r="1"/></svg></span>' +
                        '<span class="label" ondblclick="editChapter(this, \'' + escapeHtml(ch) + '\')">📌 ' + escapeHtml(ch) + ' <span class="count">' + slides.length + '</span></span>' +
                        '<div class="divider-actions">' +
                        '<button class="divider-btn" onclick="editChapter(this.parentElement.parentElement.querySelector(\'.label\'), \'' + escapeHtml(ch) + '\')" title="重命名">' +
                        '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                        '</button>' +
                        '<button class="divider-btn danger" onclick="deleteChapter(\'' + escapeHtml(ch) + '\')" title="删除章节">' +
                        '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
                        '</button>' +
                        '</div>';
                    section.appendChild(divider);

                    // Grid for this chapter's cards
                    var grid = document.createElement('div');
                    grid.className = 'slide-grid';
                    grid.dataset.chapter = ch;

                    slides.forEach(function(slide) {
                        grid.appendChild(createSlideCard(slide));
                    });

                    section.appendChild(grid);
                    container.appendChild(section);
                });

                initSortable();
            }

            function createSlideCard(slide) {
                var card = document.createElement('div');
                card.className = 'slide-card';
                card.dataset.slideId = slide.slide_id;

                var preview = document.createElement('div');
                preview.className = 'card-preview';
                preview.id = 'preview-' + slide.slide_id;
                preview.tabIndex = 0;
                preview.setAttribute('role', 'button');
                preview.setAttribute('aria-label', '预览 ' + (slide.title || '幻灯片'));
                preview.onclick = function() { openSlidePreview(slide); };
                preview.onkeydown = function(event) {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        openSlidePreview(slide);
                    }
                };

                var placeholder = document.createElement('div');
                placeholder.className = 'preview-placeholder';
                placeholder.textContent = '正在准备缩略图…';
                var thumbnail = document.createElement('img');
                thumbnail.className = 'preview-thumbnail';
                thumbnail.src = '/api/slides/' + encodeURIComponent(slide.slide_id) + '/thumbnail';
                thumbnail.loading = 'lazy';
                thumbnail.decoding = 'async';
                thumbnail.alt = slide.title || '幻灯片缩略图';
                thumbnail.addEventListener('load', function() {
                    if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                });
                thumbnail.addEventListener('error', function() {
                    placeholder.textContent = '缩略图生成失败，点击仍可预览';
                    thumbnail.remove();
                });
                var openLabel = document.createElement('div');
                openLabel.className = 'preview-open-label';
                openLabel.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/></svg><span>点击预览</span>';
                preview.appendChild(placeholder);
                preview.appendChild(thumbnail);
                preview.appendChild(openLabel);

                var footer = document.createElement('div');
                footer.className = 'card-footer';
                footer.innerHTML =
                    '<div class="drag-handle"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg></div>' +
                    '<span class="card-title">' + escapeHtml(slide.title || '未命名') + '</span>' +
                    '<span class="card-type">' + (TYPE_LABELS[slide.type] || '📄 HTML') + '</span>' +
                    '<button class="btn-delete" onclick="deleteSlide(\'' + slide.slide_id + '\')" title="删除幻灯片">' +
                    '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
                    '</button>';

                card.appendChild(preview);
                card.appendChild(footer);
                return card;
            }

            function openSlidePreview(slide) {
                var modal = document.getElementById('previewModal');
                document.getElementById('previewDialogTitle').textContent = slide.title || '幻灯片预览';
                var frame = document.createElement('iframe');
                frame.id = 'previewFrame';
                frame.title = '幻灯片预览';
                frame.allow = 'autoplay; fullscreen';
                frame.src = '/api/slides/' + encodeURIComponent(slide.slide_id) + '/page';
                document.getElementById('previewFrameWrap').replaceChildren(frame);
                modal.classList.add('open');
                modal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                document.getElementById('previewCloseButton').focus();
            }

            function closeSlidePreview() {
                var modal = document.getElementById('previewModal');
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
                // 移除 iframe 会立即释放视频、HTML 动画和相关资源。
                document.getElementById('previewFrameWrap').replaceChildren();
                document.body.style.overflow = '';
            }

            document.getElementById('previewCloseButton').addEventListener('click', closeSlidePreview);
            document.getElementById('previewModal').addEventListener('click', function(event) {
                if (event.target === this) closeSlidePreview();
            });
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && document.getElementById('previewModal').classList.contains('open')) {
                    closeSlidePreview();
                }
            });

            var _autoSaveTimer = null;

            function initSortable() {
                sortableInstances.forEach(function(inst) { inst.destroy(); });
                sortableInstances = [];
                if (chapterSortableInstance) {
                    chapterSortableInstance.destroy();
                    chapterSortableInstance = null;
                }

                // 章节排序只移动现有 section 节点，不会重建里面的预览 iframe。
                chapterSortableInstance = new Sortable(document.getElementById('editorBody'), {
                    draggable: '.chapter-section',
                    handle: '.chapter-drag-handle',
                    animation: 200,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    delay: 150,
                    delayOnTouchOnly: true,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                    onEnd: scheduleAutoSave,
                });

                document.querySelectorAll('.slide-grid').forEach(function(grid) {
                    var sortable = new Sortable(grid, {
                        // 所有章节共享一个分组，卡片可直接拖入另一章节。
                        group: { name: 'gsp-slides', pull: true, put: true },
                        handle: '.drag-handle',
                        animation: 200,
                        ghostClass: 'sortable-ghost',
                        chosenClass: 'sortable-chosen',
                        dragClass: 'sortable-drag',
                        delay: 150,
                        delayOnTouchOnly: true,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                        onEnd: function(evt) {
                            if (evt.from !== evt.to) {
                                var slideId = evt.item.dataset.slideId;
                                var newChapter = (evt.to || evt.from).dataset.chapter || '未分类';
                                var slide = store.slides.find(function(s) { return s.slide_id === slideId; });
                                console.log('[Drag] cross-chapter: ' + slideId + ' → ' + newChapter + (slide ? ' (was ' + slide.chapter + ')' : ''));
                            }
                            scheduleAutoSave();
                        },
                    });
                    sortableInstances.push(sortable);
                });
            }

            function scheduleAutoSave() {
                // 防抖：连续调整时仅保存最终顺序。
                clearTimeout(_autoSaveTimer);
                _autoSaveTimer = setTimeout(autoSave, 300);
            }

            function setHint(text, cls) {
                var hint = document.getElementById('saveHint');
                hint.textContent = text;
                hint.className = 'save-hint ' + (cls || 'saved');
            }

            function setHintSaving() { setHint('⏳ 保存中...', 'unsaved'); }
            function setHintSaved()  { setHint('✅ 已是最新顺序', 'saved'); }
            function setHintError()  { setHint('❌ 保存失败', 'unsaved'); setTimeout(setHintSaved, 3000); }

            var _saving = false;
            var _pendingSave = false;

            function getOrderFromDom() {
                var chapterChanges = {};
                var orderedSlides = [];
                document.querySelectorAll('.chapter-section').forEach(function(section) {
                    var grid = section.querySelector('.slide-grid');
                    if (!grid) return;
                    var chapter = grid.dataset.chapter || '未分类';
                    grid.querySelectorAll('.slide-card').forEach(function(card) {
                        var slide = slidesData.find(function(item) { return item.slide_id === card.dataset.slideId; });
                        if (!slide) return;
                        orderedSlides.push({ slide: slide, chapter: chapter });
                        if ((slide.chapter || '未分类') !== chapter) {
                            chapterChanges[slide.slide_id] = chapter;
                        }
                    });
                });
                return { orderedSlides: orderedSlides, chapterChanges: chapterChanges };
            }

            function commitDomOrder(snapshot) {
                // 成功保存后只更新内存和受影响的计数，保留当前全部 DOM/iframe。
                var orderedSlides = snapshot.orderedSlides.map(function(item) {
                    item.slide.chapter = item.chapter;
                    return item.slide;
                });
                slidesData = orderedSlides;
                store.slides = orderedSlides;
                store.slideOrder = orderedSlides.map(function(slide) { return slide.slide_id; });
                store.total = store.slideOrder.length;
                document.querySelectorAll('.chapter-section').forEach(function(section) {
                    var count = section.querySelectorAll('.slide-card').length;
                    var countEl = section.querySelector('.chapter-divider .count');
                    if (countEl) countEl.textContent = count;
                });
            }

            async function autoSave() {
                if (_saving) { _pendingSave = true; return; }
                _saving = true;
                _pendingSave = false;
                setHintSaving();

                var snapshot = getOrderFromDom();
                var chapterChanges = snapshot.chapterChanges;
                var newOrder = snapshot.orderedSlides.map(function(item) { return item.slide.slide_id; });

                console.log('[AutoSave] Sending PUT order=' + newOrder.length + ' items' + (Object.keys(chapterChanges).length > 0 ? ' changes=' + JSON.stringify(chapterChanges) : ''));
                try {
                    var body = { order: newOrder };
                    if (Object.keys(chapterChanges).length > 0) body.chapter_changes = chapterChanges;
                    var res = await fetch('/api/slides/reorder', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });
                    if (!res.ok) {
                        var errText = '';
                        try { errText = await res.text(); } catch(_) {}
                        throw new Error('HTTP ' + res.status + (errText ? ': ' + errText.slice(0,80) : ''));
                    }
                    commitDomOrder(snapshot);
                    console.log('[AutoSave] PUT OK; DOM kept intact.');
                    setHintSaved();
                    if (_pendingSave) {
                        _pendingSave = false;
                        _saving = false;
                        autoSave();
                        return;
                    }
                } catch (e) {
                    console.warn('[AutoSave] Failed:', e);
                    setHint('❌ ' + (e.message || '保存失败'), 'unsaved');
                    setTimeout(setHintSaved, 4000);
                    // 仅失败时才从服务端恢复，避免成功拖拽时的全量重绘。
                    await refreshAndRender();
                }
                _saving = false;
            }



            async function refreshAndRender() {
                await refreshSlidesFromApi();
                renderEditor();
            }

            async function deleteSlide(slideId) {
                if (!confirm('确定删除该幻灯片吗？')) return;
                try {
                    var res = await fetch('/api/slides/' + slideId, { method: 'DELETE' });
                    if (!res.ok) throw new Error('删除失败');
                    await refreshAndRender();
                    showToast('幻灯片已删除', 'success');
                } catch (e) {
                    showToast('删除失败: ' + e.message, 'error');
                }
            }

            // ---- 章节管理 ----

            async function createChapter() {
                var name = prompt('请输入新章节名称：', '新章节');
                if (!name) return;
                try {
                    var res = await fetch('/api/slides/chapter/create?chapter=' + encodeURIComponent(name), { method: 'POST' });
                    if (!res.ok) throw new Error(await res.text());
                    await refreshAndRender();
                    showToast('✅ 新章节 "' + name + '" 已创建', 'success');
                } catch (e) {
                    showToast('❌ 创建章节失败: ' + e.message, 'error');
                }
            }

            function editChapter(labelEl, oldName) {
                // 避免重复编辑
                if (labelEl.querySelector('.chapter-name-input')) return;

                var textNode = labelEl.childNodes[0];  // 文本节点 "📌 xxx"
                var currentName = oldName;
                var input = document.createElement('input');
                input.type = 'text';
                input.className = 'chapter-name-input';
                input.value = currentName;
                input.style.width = (currentName.length * 14 + 20) + 'px';

                // 替换文本节点为输入框
                labelEl.replaceChild(input, textNode);

                input.focus();
                input.select();

                function done() {
                    var newName = input.value.trim();
                    if (newName && newName !== currentName) {
                        renameChapterApi(currentName, newName, labelEl, input);
                    } else {
                        // 恢复文本
                        var text = document.createTextNode('📌 ' + currentName + ' ');
                        labelEl.replaceChild(text, input);
                    }
                }

                input.addEventListener('blur', done);
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { input.blur(); }
                    if (e.key === 'Escape') {
                        var text = document.createTextNode('📌 ' + currentName + ' ');
                        labelEl.replaceChild(text, input);
                    }
                });
            }

            async function renameChapterApi(oldName, newName, labelEl, input) {
                try {
                    var res = await fetch('/api/slides/chapter/rename?old_name=' + encodeURIComponent(oldName) + '&new_name=' + encodeURIComponent(newName), { method: 'PUT' });
                    if (!res.ok) throw new Error(await res.text());
                    var text = document.createTextNode('📌 ' + newName + ' ');
                    labelEl.replaceChild(text, input);
                    await refreshAndRender();
                    showToast('✅ 章节已重命名: ' + newName, 'success');
                } catch (e) {
                    showToast('❌ 重命名失败: ' + e.message, 'error');
                    var text = document.createTextNode('📌 ' + oldName + ' ');
                    labelEl.replaceChild(text, input);
                }
            }

            async function deleteChapter(chapterName) {
                var count = slidesData.filter(function(s) { return s.chapter === chapterName; }).length;
                if (!confirm('确定删除章节 "' + chapterName + '" 及其 ' + count + ' 页幻灯片吗？')) return;
                try {
                    var res = await fetch('/api/slides/chapter/' + encodeURIComponent(chapterName), { method: 'DELETE' });
                    if (!res.ok) throw new Error(await res.text());
                    await refreshAndRender();
                    showToast('✅ 章节 "' + chapterName + '" 已删除', 'success');
                } catch (e) {
                    showToast('❌ 删除失败: ' + e.message, 'error');
                }
            }

            // ---- Upload ----
            function triggerUpload(type) {
                var input = document.getElementById(type + 'Input');
                if (input) input.click();
            }

            function setUploadHint(text, isError) {
                var hint = document.getElementById('uploadHint');
                hint.textContent = text || '';
                hint.className = 'upload-hint' + (isError ? ' error' : '');
            }

            function setUploadButtonsDisabled(disabled) {
                document.getElementById('imageUploadButton').disabled = disabled;
                document.getElementById('videoUploadButton').disabled = disabled;
            }

            function formatFileSize(bytes) {
                if (bytes < 1024 * 1024) return Math.ceil(bytes / 1024) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(bytes >= 1024 * 1024 * 1024 ? 2 : 0) + ' MB';
            }

            function uploadMedia(formData, onProgress) {
                return new Promise(function(resolve, reject) {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/slides/upload');
                    xhr.responseType = 'json';
                    xhr.upload.onprogress = function(event) {
                        if (event.lengthComputable) onProgress(event.loaded, event.total);
                    };
                    xhr.onerror = function() { reject(new Error('网络错误，上传未完成')); };
                    xhr.onload = function() {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve(xhr.response);
                            return;
                        }
                        var detail = xhr.response && xhr.response.detail;
                        reject(new Error(detail || '上传失败（HTTP ' + xhr.status + '）'));
                    };
                    xhr.send(formData);
                });
            }

            async function handleFileUpload(input, type) {
                var file = input.files[0];
                if (!file) return;
                input.value = '';

                var formData = new FormData();
                formData.append('slide_type', type);
                formData.append('file', file);

                // 追加选中的章节到 formData
                formData.append('chapter', selectedChapter || '素材');
                setUploadButtonsDisabled(true);
                setUploadHint('⏳ 正在上传 ' + formatFileSize(file.size) + '…');
                try {
                    await uploadMedia(formData, function(loaded, total) {
                        var percent = Math.min(100, Math.round(loaded / total * 100));
                        setUploadHint('⏳ 上传中 ' + percent + '%（' + formatFileSize(loaded) + ' / ' + formatFileSize(total) + '）');
                    });
                    setUploadHint('⏳ 正在创建视频页…');
                    await refreshAndRender();
                    setUploadHint('✅ 上传完成');
                    showToast((type === 'image' ? '图片' : '视频') + '页已添加到「' + (selectedChapter || '素材') + '」章节', 'success');
                } catch (e) {
                    setUploadHint('❌ ' + e.message, true);
                    showToast('上传失败: ' + e.message, 'error');
                } finally {
                    setUploadButtonsDisabled(false);
                }
            }

            async function createExternalSlide() {
                var url = prompt('请输入外部服务或网页地址（http/https）：', 'http://127.0.0.1:8100/');
                if (!url) return;
                var title = prompt('请输入幻灯片标题：', '外部页面') || '外部页面';
                try {
                    var response = await fetch('/api/slides/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'external',
                            chapter: selectedChapter || '外部服务',
                            title: title,
                            source_url: url.trim()
                        })
                    });
                    if (!response.ok) {
                        var error = await response.json().catch(function() { return {}; });
                        throw new Error(error.detail || '创建失败');
                    }
                    await refreshAndRender();
                    showToast('外部页面已添加', 'success');
                } catch (error) {
                    showToast('外部页面创建失败: ' + error.message, 'error');
                }
            }

            // ---- Toast ----
            function showToast(msg, type) {
                var container = document.getElementById('toastContainer');
                var toast = document.createElement('div');
                toast.className = 'toast ' + (type || '');
                toast.textContent = msg;
                toast.setAttribute('role', type === 'error' ? 'alert' : 'status');
                toast.title = '点击关闭';
                container.appendChild(toast);
                requestAnimationFrame(function() {
                    toast.classList.add('show');
                });

                var removed = false;
                function dismiss() {
                    if (removed) return;
                    removed = true;
                    clearTimeout(dismissTimer);
                    toast.classList.remove('show');
                    setTimeout(function() { toast.remove(); }, 300);
                }

                // 每条提示独立计时，后续 Toast 不会取消当前提示的关闭任务。
                var dismissTimer = setTimeout(dismiss, 2500);
                toast.addEventListener('click', dismiss);
            }

            // ---- Utility ----
            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            // Add spin keyframe
            var style = document.createElement('style');
            style.textContent = '@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }';
            document.head.appendChild(style);

            // Make functions globally accessible
            window.triggerUpload = triggerUpload;
            window.handleFileUpload = handleFileUpload;
            window.createExternalSlide = createExternalSlide;
            window.deleteSlide = deleteSlide;
            window.editChapter = editChapter;
            window.deleteChapter = deleteChapter;
            window.createChapter = createChapter;

            init();
        })();
    </script>
</body>
</html>
