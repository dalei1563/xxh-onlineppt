<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年7月线下学习会 - 在线演示</title>
    <link rel="stylesheet" href="/static/editor-style.css">
    <link rel="stylesheet" href="/static/css/slides.css">
    <style>
        /* ===== 16:9 固定比例显示模式 =====
           改为 iframe 方案后，#slides-frame 自身按 100%×100% 撑满 .presentation；
           16:9 模式只控制 .presentation 的宽高比例，iframe 跟随。 */
        .presentation {
            position: relative;
            background: #000;
            overflow: hidden;
        }
        .presentation.mode-16-9 {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        .presentation.mode-16-9 .slide-frame-wrap {
            position: relative !important;
            top: auto !important;
            left: auto !important;
            flex: 0 0 auto;
            width: min(100vw, 177.78vh) !important;  /* 100vh * 16/9 */
            height: min(56.25vw, 100vh) !important;  /* 100vw * 9/16 */
        }
        .presentation.mode-16-9 .control-bar,
        .presentation.mode-16-9 .progress-bar {
            left: 50% !important;
            transform: translateX(-50%) !important;
            max-width: min(100vw, 177.78vh) !important;
        }

        /* ---- iframe 主播放器 ----
           每张 slide 是独立 HTML 文档（/api/slides/<id>/page），iframe 把它隔离加载，
           再由 .slide-frame-wrap 控制显式比例。彻底避免单张 slide HTML 出错污染整页
           的问题；同时让 slide 的 CSS / DOM 完全封装，不再与外层共用一份样式表。
        */
        .slide-frame-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .slide-frame-wrap .slide-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
            visibility: hidden;
            pointer-events: none;
            z-index: 1;
        }
        .slide-frame-wrap .slide-frame.is-active {
            visibility: visible;
            pointer-events: auto;
            z-index: 2;
        }

        .fullscreen-prompt {
            position: fixed;
            inset: 0;
            z-index: 10030;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.56);
            backdrop-filter: blur(5px);
        }
        .fullscreen-prompt.show { display: flex; }
        .fullscreen-prompt button {
            padding: 18px 30px;
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 14px 40px rgba(0,0,0,.38);
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
        }

        /* F2 视频音量增强工具栏 */
        .video-volume-toolbar {
            position: fixed;
            left: 50%;
            bottom: 26px;
            z-index: 10010;
            width: min(680px, calc(100vw - 32px));
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 13px 18px;
            color: #f8fafc;
            background: rgba(10, 18, 33, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, calc(100% + 48px));
            transition: opacity 0.2s ease, transform 0.25s ease, visibility 0.25s;
        }
        .video-volume-toolbar.is-open {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, 0);
        }
        .video-volume-toolbar .volume-title {
            flex: 0 0 auto;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
        }
        .video-volume-toolbar .volume-slider {
            min-width: 120px;
            flex: 1 1 auto;
            accent-color: #22c55e;
            cursor: pointer;
        }
        .video-volume-toolbar .volume-value {
            min-width: 62px;
            color: #86efac;
            font-size: 18px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }
        .video-volume-toolbar .volume-save-state {
            min-width: 58px;
            color: #94a3b8;
            font-size: 12px;
            white-space: nowrap;
        }
        .video-volume-toolbar .volume-shortcut {
            color: #64748b;
            font-size: 12px;
            white-space: nowrap;
        }
        @media (max-width: 640px) {
            .video-volume-toolbar {
                gap: 10px;
                padding: 12px 14px;
            }
            .video-volume-toolbar .volume-shortcut {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="presentation" id="presentation">
        <div class="slide-frame-wrap">
            <iframe
                id="__slideFrameA"
                class="slide-frame is-active"
                title="当前幻灯片"
                referrerpolicy="no-referrer"
                allow="autoplay; microphone"
            ></iframe>
            <iframe
                id="__slideFrameB"
                class="slide-frame"
                title="下一张幻灯片（预加载）"
                referrerpolicy="no-referrer"
                allow="autoplay; microphone"
                aria-hidden="true"
            ></iframe>
        </div>
    </div>

    <!-- 隐藏音频元素用于 TTS 播放 -->
    <audio id="ttsAudio" style="display:none;"></audio>

    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>

    <!-- F2 呼出的当前视频音量增强工具栏 -->
    <div class="video-volume-toolbar" id="videoVolumeToolbar" role="dialog" aria-label="视频音量增强">
        <span class="volume-title">🔊 视频音量</span>
        <input
            class="volume-slider"
            id="videoVolumeSlider"
            type="range"
            min="0"
            max="20"
            step="0.05"
            value="1"
            aria-label="视频音量增益倍数"
        >
        <output class="volume-value" id="videoVolumeValue">1.00×</output>
        <span class="volume-save-state" id="videoVolumeSaveState">已保存</span>
        <span class="volume-shortcut">F2 关闭</span>
    </div>

    <!-- 控制栏 -->
    <div class="control-bar" id="controlBar">
        <div class="nav-buttons">
            <button class="nav-btn" id="firstBtn" onclick="app.first()">⏮ 首页</button>
            <button class="nav-btn" id="prevBtn" onclick="app.prev()">◀ 上一页</button>
            <button class="nav-btn" id="nextBtn" onclick="app.next()">下一页 ▶</button>
            <button class="nav-btn" id="lastBtn" onclick="app.last()">末页 ⏭</button>
        </div>
        <div class="page-info">
            <span>第</span>
            <input type="number" class="page-input" id="pageInput" min="1" value="1" onchange="app.gotoPosition(this.value)">
            <span id="pageTotal">/ 0 页</span>
        </div>
        <div>
            <button class="nav-btn" onclick="app.doToggleFullscreen()">⛶ 全屏</button>
        </div>
    </div>

    <!-- 取消静音浮层 -->
    <div class="unmute-overlay" id="unmuteOverlay">
        <div class="unmute-btn" id="unmuteBtn">
            <span class="icon">🔊</span>
            <span>点击开启声音</span>
            <span class="hint">点击任意位置播放视频</span>
        </div>
    </div>

    <div class="fullscreen-prompt" id="fullscreenPrompt">
        <button type="button" onclick="app.doToggleFullscreen()">点击进入全屏</button>
    </div>

    <script src="/static/js/ws-client.js"></script>
    <script src="/static/js/slide-store.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const previewId = params.get('preview');
            const isPreviewMode = !!previewId;

            const app = {
                store: new SlideStore(),
                slideFrame: document.getElementById('__slideFrameA'),
                standbyFrame: document.getElementById('__slideFrameB'),
                _currentFrameSlideId: '',
                _pendingFrameSlideId: '',
                _frameLoadToken: 0,
                _currentFrameHasVideo: false,
                _currentFrameIsVideoSlide: false,
                _currentVolumeGain: 1,
                _volumeSaveTimer: null,
                _volumeSaveInFlight: false,
                _pendingVolumeSaves: {},
                _fullscreenTransition: false,
                _firstLoad: true,

                init: function() {
                    if (isPreviewMode) {
                        document.body.classList.add('preview-mode');
                        this.showSlide(previewId);
                        return;
                    }

                    const self = this;

                    // 先连接 WS，等收到 presentation_state 后再切到对应 slide
                    this.store.init().then(function() {
                        self.showSlide(self.store.currentSlideId);
                        self.updatePageInfo();
                        self.bindVideoEvents();
                    });

                    this.store.onCurrentSlideChange = function(slideId, position, total) {
                        self.showSlide(slideId);
                        self.updatePageInfo();
                    };

                    // iframe 方案下结构性变更（reorder/create/delete/update）不再需要 reload 整页：
                    // 我们对每张 slide 只在切到它时按需重新拉一次 iframe。当前正在显示的 slide
                    // 被 update 时需要主动刷新一次 iframe。
                    this.store.onSlidesReordered = function() { /* iframe 已按当前 slide_id 渲染，无需操作 */ };
                    this.store.onSlideCreated = function() {};
                    this.store.onSlideUpdated = function(slide) {
                        if (self.store.currentSlideId === slide.slide_id) self.showSlide(slide.slide_id, /*force*/ true);
                    };
                    this.store.onSlideDeleted = function() {
                        // 删除当前页时 presentation_state 已切到首张/相邻页，onCurrentSlideChange 会接管
                    };

                    this.store.onConnectionStatusChange = function(status) {
                        self.showConnectionStatus(status === 'connected');
                    };

                    this.bindDirectWsEvents();
                    this.bindFrameMessages();
                    this.bindVolumeToolbar();
                    this.bindKeyboard();
                    this.bindMouseWheel();
                },

                bindDirectWsEvents: function() {
                    const self = this;
                    this.store.ws.on('fullscreen', function() { self.doToggleFullscreen(); });
                    this.store.ws.on('replay_video', function() { self.doReplayVideo(); });
                    this.store.ws.on('tts_file', function(data) { self.playTtsAudio(data.url); });
                    this.store.ws.on('tts_browser', function(data) { self.speakBrowserTts(data.text); });
                    this.store.ws.on('tts_stop', function() { self.stopTtsAudio(); });
                    this.store.ws.on('display_mode', function(data) { self.setDisplayMode(data.mode); });
                },

                // iframe → 外层消息桥接：state 包含 hasVideo；视频结束后留在当前页。
                bindFrameMessages: function() {
                    const self = this;
                    window.addEventListener('message', function(ev) {
                        // 只接收同源 message（/api/slides 跟本页同源）
                        if (
                            ev.origin !== window.location.origin ||
                            ev.source !== self.slideFrame.contentWindow
                        ) return;
                        var msg = ev.data || {};
                        if (msg.type === 'state') {
                            self._currentFrameHasVideo = !!msg.hasVideo;
                            self._currentFrameIsVideoSlide = !!msg.isVideoSlide;
                            self._currentVolumeGain = Number.isFinite(Number(msg.volumeGain))
                                ? Number(msg.volumeGain)
                                : 1;
                            self.updateVolumeToolbar();
                            if (!self._currentFrameIsVideoSlide) self.hideVolumeToolbar();
                            self._checkAudioUnlock();
                            // 用户已经解锁过音频 → 后续切到的任何视频页都应自动取消静音
                            if (window.audioUnlocked && self._currentFrameHasVideo) {
                                try {
                                    self.slideFrame.contentWindow.postMessage({ type: 'unmute' }, window.location.origin);
                                } catch (e) {}
                            }
                        } else if (msg.type === 'video_ended') {
                            // 不自动翻页；iframe 内视频会停在最后一帧。
                            console.log('[Video] Playback ended; staying on current slide.');
                        } else if (msg.type === 'toggle_volume_toolbar') {
                            self.toggleVolumeToolbar();
                        } else if (msg.type === 'presentation_key') {
                            self.handlePresentationKey(msg.key, msg);
                        }
                    });
                },

                showSlide: function(slideId, force) {
                    if (!slideId) return;

                    // 当前页仍在显示、下一页还在后台加载时，如果又切回当前页，
                    // 取消后台任务即可，绝不能让已经过时的页面随后覆盖回来。
                    if (slideId === this._currentFrameSlideId && !force) {
                        if (this._pendingFrameSlideId) {
                            this._frameLoadToken += 1;
                            this._pendingFrameSlideId = '';
                            this.standbyFrame.onload = null;
                            this.standbyFrame.src = 'about:blank';
                        }
                        return;
                    }
                    if (slideId === this._pendingFrameSlideId && !force) return;

                    this._currentFrameHasVideo = false;
                    this._currentFrameIsVideoSlide = false;
                    this.hideVolumeToolbar();

                    // 双 iframe 缓冲：旧页继续显示；新页在不可见的备用 iframe 中加载。
                    // 等新文档（视频页还会等待首帧）准备好后，在同一个渲染周期原子替换，
                    // 避免直接修改当前 iframe.src 时暴露黑色背景。
                    var targetFrame = this.standbyFrame;
                    var loadToken = ++this._frameLoadToken;
                    var self = this;
                    this._pendingFrameSlideId = slideId;
                    targetFrame.onload = function() {
                        self._waitForFrameReady(targetFrame, slideId, loadToken);
                    };
                    // 加 ?t= 避免相同 src 时浏览器复用缓存导致 onSlideUpdated 强制刷新不生效
                    var sep = slideId.indexOf('?') >= 0 ? '&' : '?';
                    targetFrame.src = '/api/slides/' + encodeURIComponent(slideId) + '/page' + (force ? sep + 't=' + Date.now() : '');
                },

                _waitForFrameReady: function(frame, slideId, loadToken) {
                    const self = this;
                    var finished = false;
                    var fallbackTimer = null;

                    function finish() {
                        if (finished) return;
                        finished = true;
                        if (fallbackTimer) clearTimeout(fallbackTimer);
                        if (
                            loadToken !== self._frameLoadToken ||
                            slideId !== self._pendingFrameSlideId
                        ) return;

                        // 两个绘制帧确保 CSS、图片以及视频首帧已经提交到合成层。
                        var frameWindow = frame.contentWindow;
                        var schedule = frameWindow && frameWindow.requestAnimationFrame
                            ? frameWindow.requestAnimationFrame.bind(frameWindow)
                            : window.requestAnimationFrame.bind(window);
                        schedule(function() {
                            schedule(function() {
                                self._commitPreparedFrame(frame, slideId, loadToken);
                            });
                        });
                    }

                    try {
                        var frameDocument = frame.contentDocument;
                        var video = frameDocument && frameDocument.querySelector('video');
                        if (video && video.readyState < 2) {
                            video.addEventListener('loadeddata', finish, { once: true });
                            video.addEventListener('canplay', finish, { once: true });
                            video.addEventListener('error', finish, { once: true });
                            // 极端网络或解码异常时不能永久卡在旧页。
                            fallbackTimer = setTimeout(finish, 5000);
                            return;
                        }
                    } catch (e) {
                        // 页面始终是同源；若未来变为跨域，则退化为 load 后直接替换。
                    }
                    finish();
                },

                _commitPreparedFrame: function(frame, slideId, loadToken) {
                    if (
                        loadToken !== this._frameLoadToken ||
                        slideId !== this._pendingFrameSlideId
                    ) return;

                    var previousFrame = this.slideFrame;
                    try {
                        if (previousFrame.contentWindow) {
                            previousFrame.contentWindow.postMessage(
                                { type: 'pause' },
                                window.location.origin
                            );
                        }
                    } catch (e) {}

                    // 先把已准备好的页面放到上层，再隐藏旧页面；同一任务内完成，不产生中间帧。
                    frame.classList.add('is-active');
                    frame.removeAttribute('aria-hidden');
                    frame.title = '当前幻灯片';
                    previousFrame.classList.remove('is-active');
                    previousFrame.setAttribute('aria-hidden', 'true');
                    previousFrame.title = '下一张幻灯片（预加载）';

                    this.slideFrame = frame;
                    this.standbyFrame = previousFrame;
                    this._currentFrameSlideId = slideId;
                    this._pendingFrameSlideId = '';
                    frame.onload = null;

                    try {
                        frame.contentWindow.focus();
                        frame.contentWindow.postMessage({ type: 'probe' }, window.location.origin);
                    } catch (e) {}

                    // 页面已经被隐藏后再释放旧文档，停止其中的视频和外部服务。
                    previousFrame.onload = null;
                    setTimeout(function() {
                        if (!previousFrame.classList.contains('is-active')) {
                            previousFrame.src = 'about:blank';
                        }
                    }, 0);
                },

                updatePageInfo: function() {
                    const pos = this.store.currentPosition || 1;
                    const total = this.store.total || 0;
                    document.getElementById('pageInput').value = pos;
                    document.getElementById('pageInput').max = total;
                    document.getElementById('pageTotal').textContent = '/ ' + total + ' 页';
                    document.getElementById('progressFill').style.width = total > 0 ? ((pos / total) * 100) + '%' : '0%';

                    const idx = this.store.slideOrder.indexOf(this.store.currentSlideId);
                    document.getElementById('firstBtn').disabled = idx <= 0;
                    document.getElementById('prevBtn').disabled = idx <= 0;
                    document.getElementById('nextBtn').disabled = idx >= total - 1;
                    document.getElementById('lastBtn').disabled = idx >= total - 1;
                },

                _checkAudioUnlock: function() {
                    // 切到一个含视频的 slide 时，若 user 还没解除静音，弹 unmute-overlay
                    if (window.audioUnlocked) return;
                    const overlay = document.getElementById('unmuteOverlay');
                    if (!overlay) return;
                    // 页面首次加载时保持显示遮罩（忽略当前页是否含视频）
                    if (this._firstLoad) {
                        overlay.classList.add('show');
                        return;
                    }
                    if (this._currentFrameHasVideo) overlay.classList.add('show');
                    else overlay.classList.remove('show');
                },

                bindVideoEvents: function() {
                    const overlay = document.getElementById('unmuteOverlay');
                    if (!overlay) return;
                    if (this._videoEventsBound) return;
                    this._videoEventsBound = true;

                    function unlockAudio() {
                        window.audioUnlocked = true;
                        app._firstLoad = false;
                        overlay.classList.remove('show');
                        // 把当前 iframe 内视频取消静音继续播
                        try {
                            var cw = app.slideFrame.contentWindow;
                            if (cw) cw.postMessage({ type: 'unmute' }, window.location.origin);
                        } catch (e) {}
                    }

                    overlay.addEventListener('click', unlockAudio);
                    const btn = document.getElementById('unmuteBtn');
                    if (btn) btn.addEventListener('click', function(e) { e.stopPropagation(); unlockAudio(); });

                    // 页面加载时立即显示遮罩，让用户一开始就解除静音
                    if (!window.audioUnlocked) {
                        overlay.classList.add('show');
                    }
                },

                // ---- 当前视频音量增强（F2）----
                bindVolumeToolbar: function() {
                    if (this._volumeToolbarBound) return;
                    this._volumeToolbarBound = true;
                    const slider = document.getElementById('videoVolumeSlider');
                    if (!slider) return;
                    const self = this;
                    slider.addEventListener('input', function() {
                        var gain = Number(slider.value);
                        self._currentVolumeGain = gain;
                        self.updateVolumeToolbar('正在保存…');
                        try {
                            var cw = self.slideFrame.contentWindow;
                            if (cw) {
                                cw.postMessage({
                                    type: 'set_volume_gain',
                                    volumeGain: gain
                                }, window.location.origin);
                            }
                        } catch (e) {}
                        self.queueVolumeSave(self._currentFrameSlideId, gain);
                    });
                },

                updateVolumeToolbar: function(saveState) {
                    const slider = document.getElementById('videoVolumeSlider');
                    const value = document.getElementById('videoVolumeValue');
                    const state = document.getElementById('videoVolumeSaveState');
                    if (slider) slider.value = String(this._currentVolumeGain);
                    if (value) value.textContent = this._currentVolumeGain.toFixed(2) + '×';
                    if (state && saveState) state.textContent = saveState;
                    else if (state && !this._volumeSaveInFlight) state.textContent = '已保存';
                },

                toggleVolumeToolbar: function() {
                    if (!this._currentFrameIsVideoSlide) return;
                    const toolbar = document.getElementById('videoVolumeToolbar');
                    if (!toolbar) return;
                    toolbar.classList.toggle('is-open');
                    if (toolbar.classList.contains('is-open')) {
                        this.updateVolumeToolbar();
                    }
                },

                hideVolumeToolbar: function() {
                    const toolbar = document.getElementById('videoVolumeToolbar');
                    if (toolbar) toolbar.classList.remove('is-open');
                },

                queueVolumeSave: function(slideId, gain) {
                    if (!slideId) return;
                    this._pendingVolumeSaves[slideId] = gain;
                    clearTimeout(this._volumeSaveTimer);
                    const self = this;
                    this._volumeSaveTimer = setTimeout(function() {
                        self.flushVolumeSaves();
                    }, 180);
                },

                flushVolumeSaves: function() {
                    if (this._volumeSaveInFlight) return;
                    const slideIds = Object.keys(this._pendingVolumeSaves);
                    if (!slideIds.length) return;
                    const slideId = slideIds[0];
                    const gain = this._pendingVolumeSaves[slideId];
                    delete this._pendingVolumeSaves[slideId];
                    this._volumeSaveInFlight = true;
                    const self = this;
                    fetch('/api/slides/' + encodeURIComponent(slideId) + '/volume', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ volume_gain: gain })
                    }).then(function(response) {
                        if (!response.ok) throw new Error('保存失败');
                        if (self._currentFrameSlideId === slideId) {
                            self.updateVolumeToolbar('已保存');
                        }
                    }).catch(function() {
                        if (self._currentFrameSlideId === slideId) {
                            self.updateVolumeToolbar('保存失败');
                        }
                    }).finally(function() {
                        self._volumeSaveInFlight = false;
                        if (Object.keys(self._pendingVolumeSaves).length) {
                            clearTimeout(self._volumeSaveTimer);
                            self._volumeSaveTimer = setTimeout(function() {
                                self.flushVolumeSaves();
                            }, 500);
                        }
                    });
                },

                // ---- 导航与控制 ----
                next: function() { this.store.next(); },
                prev: function() { this.store.prev(); },
                first: function() { this.store.first(); },
                last: function() { this.store.last(); },
                goto: function(slideId) { this.store.goto(slideId); },
                gotoPosition: function(pos) { this.store.gotoPosition(pos); },
                sync: function() { this.store.sync(); },
                toggleFullscreen: function() { this.store.toggleFullscreen(); },
                replayVideo: function() { this.store.replayVideo(); },
                skipVideo: function() { this.next(); this.sync(); },

                getFullscreenDocument: function() {
                    if (document.fullscreenElement) return document;
                    try {
                        const frameDocument = this.slideFrame.contentDocument;
                        if (frameDocument && frameDocument.fullscreenElement) return frameDocument;
                    } catch (e) {}
                    return null;
                },

                doToggleFullscreen: async function() {
                    if (this._fullscreenTransition) return;
                    this._fullscreenTransition = true;
                    try {
                        const fullscreenDocument = this.getFullscreenDocument();
                        if (fullscreenDocument) {
                            await fullscreenDocument.exitFullscreen();
                        } else {
                            await document.documentElement.requestFullscreen();
                        }
                    } catch (error) {
                        console.warn('[Fullscreen] Toggle failed:', error);
                        document.getElementById('fullscreenPrompt').classList.add('show');
                    } finally {
                        if (document.fullscreenElement) {
                            document.getElementById('fullscreenPrompt').classList.remove('show');
                        }
                        this._fullscreenTransition = false;
                    }
                },

                doReplayVideo: function() {
                    try {
                        var cw = this.slideFrame.contentWindow;
                        if (cw) cw.postMessage({ type: 'replay_video' }, window.location.origin);
                    } catch (e) {}
                },

                // ---- Display Mode ----
                setDisplayMode: function(mode) {
                    const pres = document.getElementById('presentation');
                    if (mode === '16-9') {
                        pres.classList.add('mode-16-9');
                    } else {
                        pres.classList.remove('mode-16-9');
                    }
                    console.log('[Display] Mode:', mode);
                },

                // ---- TTS ----
                playTtsAudio: function(url) {
                    const audio = document.getElementById('ttsAudio');
                    if (!audio) {
                        const newAudio = new Audio(url);
                        newAudio.play().catch(function(e) { console.log('TTS audio play error:', e); });
                        return;
                    }
                    audio.src = url;
                    audio.play().catch(function(e) { console.log('TTS audio play error:', e); });
                },

                stopTtsAudio: function() {
                    const audio = document.getElementById('ttsAudio');
                    if (audio) {
                        audio.pause();
                        audio.currentTime = 0;
                    }
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                },

                speakBrowserTts: function(text) {
                    if (!window.speechSynthesis) return;
                    this.stopTtsAudio();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);
                },

                // ---- 输入事件 ----
                handlePresentationKey: function(key, options) {
                    const opts = options || {};
                    if (key === 'F2') {
                        this.toggleVolumeToolbar();
                        return true;
                    }
                    if (opts.ctrlKey && key === 'F1') {
                        document.getElementById('controlBar').classList.toggle('visible');
                        document.querySelector('.progress-bar').classList.toggle('visible');
                        return true;
                    }
                    switch(key) {
                        case 'ArrowRight':
                        case ' ':
                            this.next();
                            return true;
                        case 'ArrowLeft':
                        case 'Backspace':
                            this.prev();
                            return true;
                        case 'Home':
                            this.first();
                            return true;
                        case 'End':
                            this.last();
                            return true;
                        case 'f':
                        case 'F':
                            this.doToggleFullscreen();
                            return true;
                        case 'Escape':
                            if (this.store.currentSlideId === this.store.slideOrder[0]) {
                                this.skipVideo();
                                return true;
                            }
                            return false;
                        default:
                            return false;
                    }
                },

                bindKeyboard: function() {
                    document.addEventListener('keydown', function(e) {
                        if (e.target.tagName === 'INPUT') return;
                        if (app.handlePresentationKey(e.key, { ctrlKey: e.ctrlKey })) {
                            e.preventDefault();
                        }
                    });
                },

                bindMouseWheel: function() {
                    document.addEventListener('wheel', function(e) {
                        if (e.deltaY > 0) app.next();
                        else app.prev();
                    }, { passive: true });
                },

                showConnectionStatus: function(connected) {
                    let indicator = document.getElementById('wsIndicator');
                    if (!indicator) {
                        indicator = document.createElement('div');
                        indicator.id = 'wsIndicator';
                        indicator.style.cssText = 'position:fixed;top:10px;left:10px;padding:8px 15px;border-radius:20px;font-size:12px;z-index:10000;transition:all 0.3s ease;';
                        document.body.appendChild(indicator);
                    }
                    indicator.style.display = 'block';
                    indicator.style.opacity = '1';
                    indicator.style.background = connected ? 'rgba(46, 204, 113, 0.9)' : 'rgba(231, 76, 60, 0.9)';
                    indicator.style.color = 'white';
                    indicator.textContent = connected ? '✓ 已连接控制端' : '✗ 连接中...';
                    setTimeout(function() {
                        indicator.style.opacity = '0';
                        setTimeout(function() { indicator.style.display = 'none'; }, 300);
                    }, 3000);
                }
            };

            window.app = app;
            app.init();
        })();
    </script>
</body>
</html>
