<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年7月线下学习会 - AI主持演示</title>
    <link rel="stylesheet" href="/static/editor-style.css">
    <link rel="stylesheet" href="/static/css/slides.css">
</head>
<body>
    <div class="presentation" id="presentation">
        <div id="slides-container">
            <!-- 幻灯片由 JS 动态加载 -->
        </div>
    </div>

    <!-- 隐藏音频元素用于 TTS 播放 -->
    <audio id="ttsAudio" style="display:none;"></audio>

    <!-- 游戏模式 - 积分看板覆盖层 -->
    <div class="game-scoreboard" id="gameScoreboard" style="display:none;">
        <div class="game-scoreboard-inner" id="gameScoreboardInner"></div>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>

    <!-- 控制栏 -->
    <div class="control-bar" id="controlBar">
        <div class="nav-buttons">
            <button class="nav-btn" id="firstBtn" onclick="app.first()">⏮ 首页</button>
            <button class="nav-btn" id="prevBtn" onclick="app.prev()">◀ 上一页</button>
            <button class="nav-btn" id="nextBtn" onclick="app.next()">下一页 ▶</button>
            <button class="nav-btn" id="lastBtn" onclick="app.last()">末页 ⏭</button>
        </div>
        <div class="page-info">
            <span>第</span>
            <input type="number" class="page-input" id="pageInput" min="1" value="1" onchange="app.gotoPosition(this.value)">
            <span id="pageTotal">/ 0 页</span>
        </div>
        <div>
            <button class="nav-btn" onclick="app.toggleFullscreen()">⛶ 全屏</button>
        </div>
    </div>

    <script src="/static/js/ws-client.js"></script>
    <script src="/static/js/slide-store.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const previewId = params.get('preview');
            const isPreviewMode = !!previewId;

            const app = {
                store: new SlideStore(),
                container: document.getElementById('slides-container'),
                gameScoreboardVisible: false,
                lastTeamScores: {},

                init: function() {
                    if (isPreviewMode) {
                        document.body.classList.add('preview-mode');
                        this.loadSingleSlide(previewId);
                        return;
                    }

                    const self = this;

                    this.loadFullSlides().then(function() {
                        self.store.init().then(function() {
                            self.showSlide(self.store.currentSlideId);
                            self.updatePageInfo();
                            self.bindVideoEvents();
                        });
                    });

                    this.store.onCurrentSlideChange = function(slideId, position, total) {
                        self.showSlide(slideId);
                        self.updatePageInfo();
                    };

                    this.store.onSlidesReordered = function() { self.reloadSlides(); };
                    this.store.onSlideCreated = function() { self.reloadSlides(); };
                    this.store.onSlideUpdated = function(slide) {
                        if (self.store.currentSlideId === slide.slide_id) self.reloadSingleSlide(slide.slide_id);
                    };
                    this.store.onSlideDeleted = function() { self.reloadSlides(); };

                    this.store.onConnectionStatusChange = function(status) {
                        self.showConnectionStatus(status === 'connected');
                    };

                    this.store.onGameStateChange = function(isActive, round) {
                        if (isActive) self.gameScoreboardVisible = true;
                    };

                    this.bindDirectWsEvents();
                    this.bindKeyboard();
                    this.bindMouseWheel();
                },

                bindDirectWsEvents: function() {
                    const self = this;
                    this.store.ws.on('fullscreen', function() { self.doToggleFullscreen(); });
                    this.store.ws.on('replay_video', function() { self.doReplayVideo(); });
                    this.store.ws.on('tts_file', function(data) { self.playTtsAudio(data.url); });
                    this.store.ws.on('tts_browser', function(data) { self.speakBrowserTts(data.text); });
                    this.store.ws.on('tts_stop', function() { self.stopTtsAudio(); });
                    this.store.ws.on('score_update', function(data) { self.showScoreToast(data.team_name, data.score, data.delta); });
                    this.store.ws.on('score_set', function(data) { self.showScoreToast(data.team_name, data.score, 0); });
                    this.store.ws.on('score_board', function(data) {
                        if (self.gameScoreboardVisible) self.showScoreboardPanel(data.teams);
                        else self.showLeaderboard(data.teams);
                    });
                    this.store.ws.on('score_reset', function() { self.hideScoreboardPanel(); });
                    this.store.ws.on('game_control', function(data) { self.showGameStatus(data); });
                    this.store.ws.on('ai_answer', function(data) { self.showAIResponse(data.text); });
                },

                loadFullSlides: function() {
                    const self = this;
                    return fetch('/api/slides/full')
                        .then(function(res) { return res.text(); })
                        .then(function(html) { self.container.innerHTML = html; })
                        .catch(function(err) {
                            console.error('Failed to load slides:', err);
                            self.container.innerHTML = '<div class="slide template-white active"><div class="content"><p>加载幻灯片失败</p></div></div>';
                        });
                },

                reloadSlides: function() {
                    const self = this;
                    return this.loadFullSlides().then(function() {
                        self.showSlide(self.store.currentSlideId);
                        self.bindVideoEvents();
                    });
                },

                loadSingleSlide: function(slideId) {
                    const self = this;
                    fetch('/api/slides/' + slideId + '/render')
                        .then(function(res) { return res.text(); })
                        .then(function(html) {
                            self.container.innerHTML = html;
                            self.showSlide(slideId);
                        });
                },

                reloadSingleSlide: function(slideId) {
                    const self = this;
                    fetch('/api/slides/' + slideId + '/render')
                        .then(function(res) { return res.text(); })
                        .then(function(html) {
                            const old = self.container.querySelector('[data-slide="' + slideId + '"]');
                            const temp = document.createElement('div');
                            temp.innerHTML = html;
                            const neu = temp.firstElementChild;
                            if (old && neu) {
                                const wasActive = old.classList.contains('active');
                                old.parentNode.replaceChild(neu, old);
                                if (wasActive) neu.classList.add('active');
                            } else {
                                self.reloadSlides();
                            }
                        });
                },

                showSlide: function(slideId) {
                    if (!slideId) return;
                    const slides = this.container.querySelectorAll('.slide');
                    slides.forEach(function(s) { s.classList.remove('active'); });
                    const target = this.container.querySelector('[data-slide="' + slideId + '"]');
                    if (target) {
                        target.classList.add('active');
                        this.handleVideoSlide(slideId);
                    }
                },

                updatePageInfo: function() {
                    const pos = this.store.currentPosition || 1;
                    const total = this.store.total || 0;
                    document.getElementById('pageInput').value = pos;
                    document.getElementById('pageInput').max = total;
                    document.getElementById('pageTotal').textContent = '/ ' + total + ' 页';
                    document.getElementById('progressFill').style.width = total > 0 ? ((pos / total) * 100) + '%' : '0%';

                    const idx = this.store.slideOrder.indexOf(this.store.currentSlideId);
                    document.getElementById('firstBtn').disabled = idx <= 0;
                    document.getElementById('prevBtn').disabled = idx <= 0;
                    document.getElementById('nextBtn').disabled = idx >= total - 1;
                    document.getElementById('lastBtn').disabled = idx >= total - 1;
                },

                handleVideoSlide: function(slideId) {
                    const video = document.getElementById('introVideo');
                    const overlay = document.getElementById('unmuteOverlay');
                    if (!video) return;
                    const firstSlideId = this.store.slideOrder[0];
                    if (slideId === firstSlideId) {
                        video.currentTime = 0;
                        if (window.audioUnlocked) {
                            video.play().catch(function(){});
                        } else if (overlay) {
                            overlay.classList.add('show');
                        }
                    } else {
                        video.pause();
                        if (overlay) overlay.classList.remove('show');
                    }
                },

                bindVideoEvents: function() {
                    const video = document.getElementById('introVideo');
                    const overlay = document.getElementById('unmuteOverlay');
                    if (!video || !overlay) return;

                    video.addEventListener('ended', function() { app.next(); });

                    function unlockAudio() {
                        video.muted = false;
                        video.play().catch(function(){});
                        overlay.classList.remove('show');
                        window.audioUnlocked = true;
                    }

                    overlay.addEventListener('click', unlockAudio);
                    const btn = document.getElementById('unmuteBtn');
                    if (btn) btn.addEventListener('click', function(e) { e.stopPropagation(); unlockAudio(); });
                },

                // ---- 导航与控制 ----
                next: function() { this.store.next(); },
                prev: function() { this.store.prev(); },
                first: function() { this.store.first(); },
                last: function() { this.store.last(); },
                goto: function(slideId) { this.store.goto(slideId); },
                gotoPosition: function(pos) { this.store.gotoPosition(pos); },
                sync: function() { this.store.sync(); },
                toggleFullscreen: function() { this.store.toggleFullscreen(); },
                replayVideo: function() { this.store.replayVideo(); },
                skipVideo: function() { this.next(); this.sync(); },

                doToggleFullscreen: function() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(function(){});
                    } else {
                        document.exitFullscreen().catch(function(){});
                    }
                },

                doReplayVideo: function() {
                    this.first();
                    this.sync();
                },

                // ---- TTS ----
                playTtsAudio: function(url) {
                    const audio = document.getElementById('ttsAudio');
                    if (!audio) {
                        const newAudio = new Audio(url);
                        newAudio.play().catch(function(e) { console.log('TTS audio play error:', e); });
                        return;
                    }
                    audio.src = url;
                    audio.play().catch(function(e) { console.log('TTS audio play error:', e); });
                },

                stopTtsAudio: function() {
                    const audio = document.getElementById('ttsAudio');
                    if (audio) {
                        audio.pause();
                        audio.currentTime = 0;
                    }
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                },

                speakBrowserTts: function(text) {
                    if (!window.speechSynthesis) return;
                    this.stopTtsAudio();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);
                },

                // ---- 积分/游戏 ----
                showScoreToast: function(teamName, score, delta) {
                    this.showGameFlash(teamName, delta);
                    const toast = document.createElement('div');
                    toast.className = 'score-toast';
                    toast.style.cssText = 'position:fixed;bottom:80px;right:20px;background:rgba(0,51,102,0.95);color:white;padding:16px 24px;border-radius:12px;font-size:20px;font-weight:bold;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:toastSlideIn 0.3s ease forwards;';
                    const sign = delta > 0 ? '+' : '';
                    toast.innerHTML = teamName + ' <span style="color:' + (delta > 0 ? '#2ecc71' : '#e74c3c') + '">' + sign + delta + '</span> → <span style="color:#f1c40f">' + score + '分</span>';
                    document.body.appendChild(toast);
                    setTimeout(function() {
                        toast.style.transition = 'all 0.3s ease';
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateY(20px)';
                        setTimeout(function() { toast.remove(); }, 300);
                    }, 2500);
                    this.updateGameScoreboard();
                },

                showGameFlash: function(teamName, delta) {
                    const flash = document.createElement('div');
                    flash.className = 'game-flash';
                    const sign = delta > 0 ? '+' : '';
                    flash.innerHTML = '<div class="team-label">' + teamName + '</div><div class="score-delta ' + (delta > 0 ? 'positive' : 'negative') + '">' + sign + delta + '</div>';
                    document.body.appendChild(flash);
                    setTimeout(function() { flash.remove(); }, 1600);
                },

                updateGameScoreboard: function() {
                    if (!this.gameScoreboardVisible) return;
                    this.store.send({ type: 'score_get' });
                },

                showScoreboardPanel: function(teams) {
                    this.gameScoreboardVisible = true;
                    const el = document.getElementById('gameScoreboard');
                    const inner = document.getElementById('gameScoreboardInner');
                    if (!el || !inner || !teams) return;
                    el.style.display = 'block';
                    const sorted = teams.slice().sort(function(a, b) { return b.score - a.score; });
                    inner.innerHTML = '<div class="scoreboard-title">🏆 实时排行榜</div>' +
                        sorted.map(function(t) {
                            const prev = app.lastTeamScores[t.team_name] || 0;
                            const change = t.score - prev;
                            app.lastTeamScores[t.team_name] = t.score;
                            const changeHtml = change !== 0 ? '<span class="score-change ' + (change > 0 ? 'positive' : 'negative') + '">' + (change > 0 ? '+' : '') + change + '</span>' : '';
                            return '<div class="team-row"><span class="team-rank">' + (sorted.indexOf(t) + 1) + '</span><span class="team-name">' + t.team_name + '</span>' + changeHtml + '<span class="team-score">' + t.score + '</span></div>';
                        }).join('');
                },

                hideScoreboardPanel: function() {
                    this.gameScoreboardVisible = false;
                    const el = document.getElementById('gameScoreboard');
                    if (el) el.style.display = 'none';
                },

                showLeaderboard: function(teams) {
                    this.showScoreboardPanel(teams);
                },

                hideLeaderboard: function() {
                    this.hideScoreboardPanel();
                },

                showGameStatus: function(data) {
                    const toast = document.createElement('div');
                    toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:white;padding:30px 50px;border-radius:16px;font-size:28px;font-weight:bold;z-index:9999;text-align:center;animation:fadeInOut 2.5s ease;';
                    if (data.action === 'started') {
                        toast.innerHTML = '🎮 游戏环节开始<br><span style="font-size:18px;opacity:0.8;">' + (data.round_name || '') + '</span>';
                        this.gameScoreboardVisible = true;
                        document.getElementById('gameScoreboard').style.display = 'block';
                    } else if (data.action === 'ended') {
                        toast.innerHTML = '⏹ 游戏环节已结束';
                    } else if (data.action === 'reset') {
                        toast.innerHTML = '🔄 游戏已重置';
                        this.hideScoreboardPanel();
                    }
                    document.body.appendChild(toast);
                    setTimeout(function() { toast.remove(); }, 2800);
                },

                // ---- AI ----
                showAIResponse: function(text) {
                    if (!text) return;
                    const aiOverlay = document.createElement('div');
                    aiOverlay.style.cssText = 'position:fixed;top:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:16px 28px;border-radius:16px;font-size:22px;font-weight:bold;z-index:10003;text-align:center;max-width:80%;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);animation:slideUpIn 0.4s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);line-height:1.6;';
                    aiOverlay.innerHTML = '🤖 ' + text;
                    document.body.appendChild(aiOverlay);
                    setTimeout(function() {
                        aiOverlay.style.transition = 'all 0.5s ease';
                        aiOverlay.style.opacity = '0';
                        aiOverlay.style.transform = 'translateX(-50%) translateY(-30px)';
                        setTimeout(function() { aiOverlay.remove(); }, 500);
                    }, 8000);
                },

                // ---- 输入事件 ----
                bindKeyboard: function() {
                    document.addEventListener('keydown', function(e) {
                        if (e.target.tagName === 'INPUT') return;

                        if (e.ctrlKey && e.key === 'F1') {
                            e.preventDefault();
                            document.getElementById('controlBar').classList.toggle('visible');
                            document.querySelector('.progress-bar').classList.toggle('visible');
                            return;
                        }

                        switch(e.key) {
                            case 'ArrowRight':
                            case ' ':
                                e.preventDefault(); app.next(); break;
                            case 'ArrowLeft':
                            case 'Backspace':
                                e.preventDefault(); app.prev(); break;
                            case 'Home':
                                e.preventDefault(); app.first(); break;
                            case 'End':
                                e.preventDefault(); app.last(); break;
                            case 'f':
                            case 'F':
                                e.preventDefault(); app.toggleFullscreen(); break;
                            case 'Escape':
                                if (app.store.currentSlideId === app.store.slideOrder[0]) app.skipVideo();
                                break;
                        }
                    });
                },

                bindMouseWheel: function() {
                    document.addEventListener('wheel', function(e) {
                        if (e.deltaY > 0) app.next();
                        else app.prev();
                    }, { passive: true });
                },

                showConnectionStatus: function(connected) {
                    let indicator = document.getElementById('wsIndicator');
                    if (!indicator) {
                        indicator = document.createElement('div');
                        indicator.id = 'wsIndicator';
                        indicator.style.cssText = 'position:fixed;top:10px;left:10px;padding:8px 15px;border-radius:20px;font-size:12px;z-index:10000;transition:all 0.3s ease;';
                        document.body.appendChild(indicator);
                    }
                    indicator.style.display = 'block';
                    indicator.style.opacity = '1';
                    indicator.style.background = connected ? 'rgba(46, 204, 113, 0.9)' : 'rgba(231, 76, 60, 0.9)';
                    indicator.style.color = 'white';
                    indicator.textContent = connected ? '✓ 已连接控制端' : '✗ 连接中...';
                    setTimeout(function() {
                        indicator.style.opacity = '0';
                        setTimeout(function() { indicator.style.display = 'none'; }, 300);
                    }, 3000);
                }
            };

            window.app = app;
            app.init();
        })();
    </script>
</body>
</html>
