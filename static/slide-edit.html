<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP 幻灯片编辑 - GrapeJS</title>
    <!-- GrapeJS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 顶部工具栏 */
        .editor-toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: #003366;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            gap: 12px;
        }
        .editor-toolbar .title {
            font-size: 15px;
            font-weight: bold;
            flex: 1;
        }
        .editor-toolbar .slide-info {
            font-size: 12px;
            opacity: 0.7;
        }
        .editor-toolbar button {
            padding: 6px 18px;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }
        .editor-toolbar .btn-back {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .editor-toolbar .btn-back:hover { background: rgba(255,255,255,0.25); }
        .editor-toolbar .btn-save {
            background: #2ecc71;
            color: white;
        }
        .editor-toolbar .btn-save:hover { background: #27ae60; }
        .editor-toolbar .btn-save:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* GrapeJS 编辑器容器 */
        #gjs {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* 保存状态提示 */
        .save-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .save-status.show { opacity: 1; }
    </style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="editor-toolbar">
    <button class="btn-back" onclick="goBack()">← 返回</button>
    <span class="title">✏️ 幻灯片编辑器</span>
    <span class="slide-info" id="slideInfo">加载中...</span>
    <button class="btn-save" id="saveBtn" onclick="saveContent()" disabled>💾 保存</button>
</div>

<!-- GrapeJS 编辑器容器 -->
<div id="gjs"></div>

<!-- 保存状态提示 -->
<div class="save-status" id="saveStatus"></div>

<!-- GrapeJS JS -->
<script src="https://unpkg.com/grapesjs"></script>
<script>
    // ==================== 初始化 ====================
    const params = new URLSearchParams(window.location.search);
    const slideId = params.get('slide') || '1';

    let editor = null;
    let originalContent = '';
    let slidesData = null;

    // 加载幻灯片信息
    async function init() {
        try {
            // 获取幻灯片信息
            const res = await fetch('/api/slides');
            const allSlides = await res.json();
            slidesData = allSlides.find(s => s.slide_id === slideId);

            document.getElementById('slideInfo').textContent =
                `#${slideId} ${slidesData ? '- ' + slidesData.title : ''}`;

            // 获取幻灯片 HTML
            const htmlRes = await fetch(`/api/slides/${slideId}/html`);
            const html = await htmlRes.text();
            originalContent = html;

            // 初始化 GrapeJS
            initEditor(html);
        } catch (e) {
            console.error('初始化失败:', e);
            document.getElementById('slideInfo').textContent = '❌ 加载失败';
        }
    }

    function initEditor(html) {
        editor = grapesjs.init({
            container: '#gjs',
            fromElement: false,
            height: '100%',
            width: '100%',
            // 存储管理
            storageManager: false,
            // 默认画布尺寸
            deviceManager: {
                devices: [
                    { name: '演示 1920x1080', width: '1920px', height: '1080px', widthMedia: '1920px' },
                ]
            },
            // 组件面板 - 可拖拽到画布
            blockManager: {
                blocks: [
                    { id: 'text', label: '文字', content: '<div style="padding:10px;font-size:28px;">双击编辑文字</div>', category: '基础' },
                    { id: 'heading', label: '标题', content: '<h1 style="font-size:48px;font-weight:bold;padding:10px;">标题</h1>', category: '基础' },
                    { id: 'subtitle', label: '副标题', content: '<h2 style="font-size:32px;font-weight:normal;padding:10px;">副标题</h2>', category: '基础' },
                    { id: 'paragraph', label: '段落', content: '<p style="font-size:20px;line-height:1.8;padding:10px;">段落文字</p>', category: '基础' },
                    { id: 'image', label: '图片', content: '<img data-gjs-removable="true" src="https://via.placeholder.com/400x300/003366/fff?text=图片" style="max-width:100%;"/>', category: '媒体' },
                    { id: 'list', label: '列表', content: '<ul style="font-size:20px;line-height:2;"><li>项目 1</li><li>项目 2</li><li>项目 3</li></ul>', category: '基础' },
                    { id: 'button', label: '按钮', content: '<button style="padding:12px 32px;background:#003366;color:white;border:none;border-radius:8px;font-size:20px;cursor:pointer;">按钮</button>', category: '组件' },
                    { id: 'spacer', label: '间距', content: '<div style="height:30px;"></div>', category: '布局' },
                    { id: 'flex-row', label: '左右分栏', content: '<div style="display:flex;gap:20px;padding:10px;"><div style="flex:1;padding:20px;border:1px dashed #ccc;">左</div><div style="flex:1;padding:20px;border:1px dashed #ccc;">右</div></div>', category: '布局' },
                ],
            },
            // 样式管理器
            styleManager: {
                sectors: [
                    { name: '排版', open: true, buildProps: ['font-family', 'font-size', 'font-weight', 'color', 'text-align', 'line-height', 'letter-spacing'] },
                    { name: '背景', open: true, buildProps: ['background-color', 'background-image', 'background-size', 'background-repeat'] },
                    { name: '尺寸', open: true, buildProps: ['width', 'height', 'min-height', 'padding', 'margin'] },
                    { name: '边框', open: true, buildProps: ['border-radius', 'border-width', 'border-style', 'border-color', 'box-shadow'] },
                ],
            },
            // 插件 - 不加载额外插件
            plugins: [],
        });

        // 设置内容
        editor.setComponents(html);

        // 设置画布尺寸
        setTimeout(() => {
            editor.setDevice('演示 1920x1080');
        }, 100);

        // 监听变化
        editor.on('component:update', markDirty);
        editor.on('component:add', markDirty);
        editor.on('component:remove', markDirty);

        document.getElementById('saveBtn').disabled = false;
    }

    // ==================== 保存 ====================
    let isDirty = false;

    function markDirty() {
        if (!isDirty) {
            isDirty = true;
            document.getElementById('saveBtn').style.background = '#f39c12';
        }
    }

    async function saveContent() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = '⏳ 保存中...';

        try {
            // 获取 GrapeJS 生成的 HTML
            const html = editor.getHtml();
            const css = editor.getCss();

            // 组合完整 HTML（内联样式 + 结构）
            const fullHtml = `<div style="${css.replace(/\n/g, ' ')}">${html}</div>`;

            // 发送到服务器
            const res = await fetch(`/api/slides/${slideId}/html`, {
                method: 'PUT',
                headers: { 'Content-Type': 'text/plain' },
                body: fullHtml,
            });

            if (!res.ok) throw new Error('保存失败');

            isDirty = false;
            btn.textContent = '✅ 已保存';
            btn.style.background = '#2ecc71';
            showStatus('✅ 保存成功！');

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '💾 保存';
            }, 1500);

        } catch (e) {
            btn.disabled = false;
            btn.textContent = '❌ 重试保存';
            btn.style.background = '#e74c3c';
            showStatus('❌ 保存失败: ' + e.message);
        }
    }

    // ==================== 导航 ====================
    function goBack() {
        if (isDirty) {
            if (!confirm('有未保存的更改，确定要离开吗？')) return;
        }
        window.location.href = '/editor.html';
    }

    // ==================== 工具 ====================
    function showStatus(msg) {
        const el = document.getElementById('saveStatus');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ESC 触发保存快捷键
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveContent();
        }
    });

    // ==================== 启动 ====================
    init();
</script>
</body>
</html>
